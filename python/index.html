<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Python 脚本下载</title>
  <meta name="description" content="自动读取 python 目录下的 .py 脚本，展示功能介绍，并支持搜索和一键下载。" />
  <style>
    :root {
      color-scheme: dark;
      --bg: #07111f;
      --card: rgba(15, 23, 42, 0.76);
      --card-strong: rgba(30, 41, 59, 0.88);
      --text: #f8fafc;
      --muted: #94a3b8;
      --line: rgba(148, 163, 184, 0.22);
      --brand: #38bdf8;
      --brand-2: #22c55e;
      --shadow: 0 24px 70px rgba(2, 6, 23, 0.45);
      --radius: 22px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(56, 189, 248, 0.22), transparent 34rem),
        radial-gradient(circle at 85% 8%, rgba(34, 197, 94, 0.14), transparent 24rem),
        linear-gradient(135deg, #020617 0%, var(--bg) 54%, #0f172a 100%);
    }

    a { color: inherit; text-decoration: none; }

    .page {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 40px 0 56px;
    }

    .hero {
      position: relative;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 32px;
      padding: clamp(28px, 6vw, 56px);
      background: linear-gradient(135deg, rgba(15, 23, 42, 0.86), rgba(15, 23, 42, 0.52));
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: auto -8rem -13rem auto;
      width: 28rem;
      height: 28rem;
      border-radius: 999px;
      background: rgba(56, 189, 248, 0.14);
      filter: blur(16px);
      pointer-events: none;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 13px;
      border: 1px solid rgba(56, 189, 248, 0.28);
      border-radius: 999px;
      color: #bae6fd;
      background: rgba(14, 165, 233, 0.1);
      font-size: 14px;
      font-weight: 700;
    }

    h1 {
      margin: 20px 0 12px;
      max-width: 820px;
      font-size: clamp(34px, 7vw, 70px);
      line-height: 1.02;
      letter-spacing: -0.06em;
    }

    .lead {
      max-width: 780px;
      margin: 0;
      color: var(--muted);
      font-size: clamp(16px, 2.4vw, 20px);
    }

    .toolbar {
      position: sticky;
      top: 0;
      z-index: 5;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 14px;
      align-items: center;
      margin: 24px 0;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 24px;
      background: rgba(2, 6, 23, 0.76);
      backdrop-filter: blur(16px);
      box-shadow: 0 18px 44px rgba(2, 6, 23, 0.28);
    }

    .search {
      display: flex;
      align-items: center;
      gap: 12px;
      min-height: 52px;
      padding: 0 16px;
      border: 1px solid rgba(148, 163, 184, 0.24);
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.82);
    }

    .search svg { flex: 0 0 auto; color: var(--brand); }

    #searchInput {
      width: 100%;
      border: 0;
      outline: 0;
      color: var(--text);
      background: transparent;
      font: inherit;
    }

    #searchInput::placeholder { color: #64748b; }

    .count {
      white-space: nowrap;
      color: #cbd5e1;
      font-size: 14px;
      padding: 0 12px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 18px;
    }

    .card {
      display: flex;
      flex-direction: column;
      min-height: 260px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 22px;
      background: var(--card);
      box-shadow: 0 20px 50px rgba(2, 6, 23, 0.2);
      transition: transform 0.2s ease, border-color 0.2s ease, background 0.2s ease;
    }

    .card:hover {
      transform: translateY(-4px);
      border-color: rgba(56, 189, 248, 0.46);
      background: var(--card-strong);
    }

    .file-name {
      margin: 0 0 10px;
      overflow-wrap: anywhere;
      font-size: 20px;
      line-height: 1.25;
    }

    .desc {
      display: -webkit-box;
      margin: 0 0 18px;
      overflow: hidden;
      color: var(--muted);
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 5;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: auto;
      padding-top: 10px;
    }

    .pill {
      padding: 6px 10px;
      border: 1px solid rgba(148, 163, 184, 0.18);
      border-radius: 999px;
      color: #cbd5e1;
      background: rgba(15, 23, 42, 0.58);
      font-size: 12px;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 18px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 44px;
      border-radius: 14px;
      font-weight: 800;
      transition: transform 0.18s ease, opacity 0.18s ease;
    }

    .btn:hover { transform: translateY(-1px); }

    .download { background: linear-gradient(135deg, var(--brand), #2563eb); color: #fff; }
    .view { border: 1px solid rgba(148, 163, 184, 0.24); color: #e2e8f0; background: rgba(15, 23, 42, 0.6); }

    .state {
      display: none;
      margin-top: 22px;
      padding: 24px;
      border: 1px dashed rgba(148, 163, 184, 0.35);
      border-radius: var(--radius);
      color: var(--muted);
      text-align: center;
      background: rgba(15, 23, 42, 0.45);
    }

    .state.show { display: block; }

    footer {
      margin-top: 28px;
      color: #64748b;
      font-size: 13px;
      text-align: center;
    }

    @media (max-width: 920px) {
      .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }

    @media (max-width: 640px) {
      .page { width: min(100% - 22px, 1180px); padding-top: 18px; }
      .hero { border-radius: 24px; padding: 26px 20px; }
      .toolbar { position: static; grid-template-columns: 1fr; border-radius: 20px; }
      .count { padding-left: 4px; }
      .grid { grid-template-columns: 1fr; }
      .card { min-height: auto; padding: 18px; }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero">
      <span class="badge">🐍 Python Scripts</span>
      <h1>Python 脚本下载中心</h1>
      <p class="lead">自动读取当前 <strong>python</strong> 目录下的 <strong>.py</strong> 文件，提取脚本注释/文档作为功能介绍。链接使用相对路径，部署到任意域名或子目录都能自适应。</p>
    </section>

    <section class="toolbar" aria-label="脚本搜索工具栏">
      <label class="search" for="searchInput">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="m21 21-4.35-4.35m1.35-5.65a7 7 0 1 1-14 0 7 7 0 0 1 14 0Z" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        <input id="searchInput" type="search" placeholder="搜索脚本名称、功能介绍、依赖..." autocomplete="off" />
      </label>
      <div class="count" id="countText">正在读取脚本...</div>
    </section>

    <section class="grid" id="scriptGrid" aria-live="polite"></section>
    <div class="state" id="emptyState">没有找到匹配的脚本，请换个关键词试试。</div>
    <div class="state" id="errorState">无法自动读取目录列表，已显示内置脚本清单。若新增脚本，请开启服务器目录索引，或在页面的 FALLBACK_FILES 中补充文件名。</div>

    <footer>下载链接会自动使用当前访问域名：<span id="originText"></span></footer>
  </main>

  <script>
    const FALLBACK_FILES = [
      "压缩文件移动文件.py",
      "时长分辨率统计.py"
    ];

    const grid = document.querySelector("#scriptGrid");
    const searchInput = document.querySelector("#searchInput");
    const countText = document.querySelector("#countText");
    const emptyState = document.querySelector("#emptyState");
    const errorState = document.querySelector("#errorState");
    const originText = document.querySelector("#originText");
    let scripts = [];

    originText.textContent = location.origin || "当前域名";

    function unique(list) {
      return [...new Set(list)].filter(Boolean).sort((a, b) => a.localeCompare(b, "zh-CN"));
    }

    function fileUrl(name) {
      return encodeURI(name).replace(/#/g, "%23");
    }

    async function discoverPythonFiles() {
      try {
        const response = await fetch("./", { cache: "no-store" });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const html = await response.text();
        const doc = new DOMParser().parseFromString(html, "text/html");
        const files = [...doc.querySelectorAll("a")]
          .map((a) => decodeURIComponent((a.getAttribute("href") || "").split(/[?#]/)[0]))
          .map((href) => href.replace(/^\.\//, ""))
          .filter((href) => href.endsWith(".py") && !href.includes("/"));
        if (files.length) return unique(files);
        throw new Error("目录页中未发现 .py 链接");
      } catch (error) {
        console.warn("自动目录读取失败，使用内置清单：", error);
        errorState.classList.add("show");
        return unique(FALLBACK_FILES);
      }
    }

    function extractDescription(source, name) {
      const docMatch = source.match(/^[\s\S]{0,2000}?[rubfRUBF]*(["']{3})([\s\S]*?)\1/);
      if (docMatch?.[2]) {
        return docMatch[2].split("\n").map((line) => line.trim()).filter(Boolean).slice(0, 8).join(" ");
      }

      const comments = source.split("\n")
        .map((line) => line.trim())
        .filter((line) => line.startsWith("#"))
        .map((line) => line.replace(/^#+\s?/, ""))
        .filter(Boolean)
        .slice(0, 8);

      return comments.join(" ") || `${name} Python 脚本，可点击下载到本地查看和运行。`;
    }

    function detectTags(source) {
      const tags = [".py"];
      if (/argparse|sys\.argv/.test(source)) tags.push("命令行");
      if (/ThreadPoolExecutor|multiprocessing|asyncio/.test(source)) tags.push("并发");
      if (/csv/.test(source)) tags.push("CSV");
      if (/zipfile|shutil/.test(source)) tags.push("文件处理");
      if (/PIL|Image/.test(source)) tags.push("图片");
      if (/ffprobe|subprocess/.test(source)) tags.push("媒体");
      return unique(tags).slice(0, 5);
    }

    async function loadScriptInfo(name) {
      try {
        const response = await fetch(fileUrl(name), { cache: "no-store" });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const source = await response.text();
        return {
          name,
          url: fileUrl(name),
          description: extractDescription(source, name),
          tags: detectTags(source),
          size: new Blob([source]).size
        };
      } catch (error) {
        return {
          name,
          url: fileUrl(name),
          description: `${name} Python 脚本，可点击下载。`,
          tags: [".py"],
          size: 0
        };
      }
    }

    function formatSize(bytes) {
      if (!bytes) return "未知大小";
      if (bytes < 1024) return `${bytes} B`;
      return `${(bytes / 1024).toFixed(1)} KB`;
    }

    function render() {
      const keyword = searchInput.value.trim().toLowerCase();
      const filtered = scripts.filter((item) => [item.name, item.description, ...(item.tags || [])].join(" ").toLowerCase().includes(keyword));

      grid.innerHTML = filtered.map((item) => `
        <article class="card">
          <h2 class="file-name">${item.name}</h2>
          <p class="desc">${item.description}</p>
          <div class="meta">
            <span class="pill">${formatSize(item.size)}</span>
            ${item.tags.map((tag) => `<span class="pill">${tag}</span>`).join("")}
          </div>
          <div class="actions">
            <a class="btn download" href="${item.url}" download>下载脚本</a>
            <a class="btn view" href="${item.url}" target="_blank" rel="noopener">在线查看</a>
          </div>
        </article>
      `).join("");

      countText.textContent = keyword ? `找到 ${filtered.length} / ${scripts.length} 个脚本` : `共 ${scripts.length} 个脚本`;
      emptyState.classList.toggle("show", scripts.length > 0 && filtered.length === 0);
    }

    async function init() {
      const files = await discoverPythonFiles();
      scripts = await Promise.all(files.map(loadScriptInfo));
      render();
    }

    searchInput.addEventListener("input", render);
    init();
  </script>
</body>
</html>
