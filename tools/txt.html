<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>AI 综合工作台 - DatXY</title>
    <link rel="shortcut icon" href="https://github.githubassets.com/favicons/favicon.svg" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ================== 1. 核心变量 ================== */
        :root {
            --bg-body: #020617; 
            --bg-card: rgba(30, 41, 59, 0.6);
            --bg-panel: rgba(15, 23, 42, 0.5);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --text-tertiary: #64748b;
            --border-light: rgba(255, 255, 255, 0.08);
            --border-hover: rgba(255, 255, 255, 0.2);
            --radius-card: 20px;
            --radius-pill: 999px;
            --theme-blue: #38bdf8;
            --theme-green: #34d399;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-body);
            background-image: 
                radial-gradient(circle at 50% -20%, #1e293b 0%, transparent 60%),
                radial-gradient(circle at 50% 10%, rgba(56, 189, 248, 0.05) 0%, transparent 50%);
            background-attachment: fixed;
            color: var(--text-primary);
            line-height: 1.6;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        a { text-decoration: none; color: inherit; transition: 0.2s; }

        /* ================== 2. 顶部统计导航栏 ================== */
        .sticky-header-wrapper {
            width: 100%; display: flex; justify-content: center;
            padding: 15px 20px; z-index: 999;
        }
        .filter-bar { 
            display: flex; gap: 15px; align-items: center; background: rgba(0, 0, 0, 0.3); padding: 8px 15px; 
            border-radius: 14px; border: 1px solid rgba(255,255,255,0.08); 
            width: 100%; max-width: 1600px; backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
        }
        
        #stats { 
            display: flex; flex-wrap: wrap; gap: 8px; flex: 1;
        }
        #stats div { 
            font-size: 0.8rem; font-weight: 600; color: var(--theme-blue); 
            background: rgba(56, 189, 248, 0.1); padding: 4px 10px; border-radius: 8px; 
            border: 1px solid rgba(56, 189, 248, 0.2); display: flex; align-items: center; white-space: nowrap;
        }
        #stats div span { color: #fff; margin-left: 4px; font-weight: 700;} 

        .tag-btn { 
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); color: var(--text-primary); 
            padding: 6px 16px; border-radius: 8px; font-size: 0.85rem; 
            font-weight: 600; cursor: pointer; transition: all 0.3s; white-space: nowrap; 
        }
        .tag-btn:hover { color: #fff; background: rgba(255, 255, 255, 0.15); border-color: rgba(255, 255, 255, 0.25); box-shadow: 0 4px 10px rgba(0,0,0,0.2);}

        /* ================== 3. 宽屏工作台布局 ================== */
        .workspace {
            width: 100%; max-width: 1600px; flex: 1; margin-bottom: 20px;
            background: var(--bg-card); border: 1px solid var(--border-light);
            border-radius: var(--radius-card); box-shadow: 0 30px 60px -15px rgba(0,0,0,0.7);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            display: flex; overflow: hidden; animation: fadeUp 0.6s ease backwards;
        }

        /* 左侧：工作与预览面板 */
        .editor-panel {
            flex: 1; padding: 20px; display: flex; flex-direction: column; position: relative;
            background: radial-gradient(circle at top left, rgba(30, 41, 59, 0.3) 0%, transparent 70%);
        }

        /* 右侧：控制面板 */
        .control-panel {
            flex: 0 0 380px; padding: 25px; display: flex; flex-direction: column; gap: 20px;
            border-left: 1px solid var(--border-light); background: var(--bg-panel);
            overflow-y: auto;
        }
        .control-panel::-webkit-scrollbar { width: 6px; }
        .control-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }

        /* ================== 4. UI 控件样式 ================== */
        .section-title { font-size: 0.85rem; font-weight: 700; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center;}
        
        .glass-card { background: rgba(0, 0, 0, 0.2); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 12px; padding: 15px; }

        .glass-input { 
            width: 100%; background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 8px; color: var(--text-primary); padding: 10px 12px; font-family: inherit; 
            font-size: 0.9rem; transition: all 0.3s; margin-bottom: 10px;
        }
        .glass-input::placeholder { color: rgba(148, 163, 184, 0.4); }
        .glass-input:focus { background: rgba(15, 23, 42, 0.9); border-color: rgba(56, 189, 248, 0.5); box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.15); }
        
        select.glass-input { 
            appearance: none; -webkit-appearance: none; 
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2394a3b8' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e"); 
            background-repeat: no-repeat; background-position: right 12px center; background-size: 16px; padding-right: 35px; cursor: pointer; 
        }
        select.glass-input option { background-color: #0f172a; color: #fff; }
        select.glass-input:disabled { background-color: rgba(255, 255, 255, 0.02); color: var(--text-tertiary); cursor: not-allowed; border-color: transparent; }

        /* 统一简约按钮风格 */
        .btn-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .btn { 
            padding: 8px 10px; border-radius: 8px; font-size: 0.85rem; font-weight: 600; 
            cursor: pointer; transition: all 0.2s; text-align: center; border: none;
        }
        .btn:active { transform: translateY(0); }
        
        .btn-glass {
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); color: var(--text-primary);
        }
        .btn-glass:hover {
            background: rgba(255, 255, 255, 0.15); border-color: rgba(255, 255, 255, 0.25);
            color: #fff; transform: translateY(-2px); box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        
        .bg-blue { background: var(--theme-blue); color: #0f172a; border: none;}
        .bg-blue:hover { background: #7dd3fc; color: #0f172a; transform: translateY(-2px); box-shadow: 0 4px 15px rgba(56, 189, 248, 0.4);}
        .bg-blue:disabled { background: rgba(255,255,255,0.1); color: var(--text-tertiary); box-shadow: none; cursor: not-allowed; transform: none; }

        /* TTS 样式 */
        .tts-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; font-size: 0.85rem; color: var(--text-secondary); }
        .tts-row input[type="range"] { width: 60%; accent-color: var(--theme-blue); }
        .tts-checkbox { display: flex; align-items: center; gap: 8px; font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 10px;}
        input[type="checkbox"] { accent-color: var(--theme-blue); width: 16px; height: 16px; cursor: pointer; }

        /* ================== 5. 左侧内容区 & 图像覆盖层 ================== */
        #textarea { 
            flex: 1; width: 100%; height: 100%; resize: none; background: rgba(0, 0, 0, 0.3); 
            border: 1px solid var(--border-light); border-radius: 12px; padding: 20px; 
            color: var(--text-primary); font-family: monospace; font-size: 0.95rem; line-height: 1.6;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.2); transition: border-color 0.3s;
        }
        #textarea:focus { border-color: rgba(56, 189, 248, 0.4); outline: none; }

        /* 生成进度悬浮条 */
        .progress-overlay {
            position: absolute; top: 40px; left: 50%; transform: translateX(-50%);
            background: rgba(15, 23, 42, 0.85); border: 1px solid var(--theme-blue);
            padding: 10px 25px; border-radius: 30px; display: none; align-items: center; gap: 10px;
            color: var(--theme-blue); font-weight: 600; font-size: 0.9rem; z-index: 20;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
        }
        .loader-spinner {
            width: 18px; height: 18px; border: 2px solid rgba(56, 189, 248, 0.3); 
            border-top-color: var(--theme-blue); border-radius: 50%; animation: spin 1s linear infinite;
        }

        /* 图像结果覆盖层 */
        .result-image-wrapper { 
            position: absolute; top: 20px; left: 20px; right: 20px; bottom: 20px;
            background: rgba(15, 23, 42, 0.95); border-radius: 12px; border: 1px solid var(--border-light);
            display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 10;
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
        }
        .result-image { max-width: 95%; max-height: calc(100% - 80px); object-fit: contain; border-radius: 12px; box-shadow: 0 20px 40px rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.1); }
        
        .action-row { display: flex; gap: 15px; margin-top: 20px; }
        .error-msg { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.3); color: #fca5a5; padding: 12px 24px; border-radius: 8px; font-weight: 500; font-size: 0.9rem; display: none; z-index: 30;}
        
        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 1024px) {
            .workspace { flex-direction: column-reverse; overflow-y: auto; }
            .control-panel { flex: none; border-left: none; border-top: 1px solid var(--border-light); }
            #textarea { height: 400px; flex: none; }
            .result-image-wrapper { top: 0; left: 0; right: 0; bottom: 0; position: fixed; border-radius: 0; z-index: 9999;}
        }
    </style>
</head>
<body>

    <div class="sticky-header-wrapper">
        <div class="filter-bar">
            <div id="stats">
                <div id="total">总数：<span>0</span></div>
                <div id="chinese">汉字：<span>0</span></div>
                <div id="punctuation">标点：<span>0</span></div>
                <div id="alphabet">字母：<span>0</span></div>
                <div id="numbers">数字：<span>0</span></div>
                <div id="duplicate">重复：<span>0</span></div>
                <div id="replace-count">替换：<span>0</span></div>
                <div id="regex-replace-count">正则：<span>0</span></div>
            </div>
            <button class="tag-btn" onclick="window.location.href='/'">返回主页 ➔</button>
        </div>
    </div>

    <div class="workspace">
        
        <div class="editor-panel">
            
            <textarea id="textarea" placeholder="非数字：[^0-9]*&#10;n位的数字：\d{n}&#10;至少n位的数字：\d{n,}&#10;匹配多行文本中每行的最后的两个字符:.{2}(?=\n|$)&#10;匹配多行文本中每行的开始的两个字符:(?<=^|\n).{2}&#10;中文字符的正则表达式：[\u4e00-\u9fa5]&#10;英文和数字：[A-Za-z0-9]+ 或 [A-Za-z0-9]{4,40}&#10;长度为3-20的所有字符：.{3,20}&#10;由数字和26个英文字母组成的字符串：[A-Za-z0-9]+&#10;由数字、26个英文字母或者下划线组成的字符串：\w+ 或 \w{3,20}&#10;&#10;curl.exe -o NUL http://speedtest.tele2.net/10GB.zip&#10;curl -s -o ~/x https://raw.githubusercontent.com/olegos2/mobox/main/install && . ~/x&#10;curl -sSL https://dokploy.com/install.sh | sudo sh&#10;&#10;sudo passwd root&#10;&#10;conda create -n python38 python=3.8 # 创建虚拟环境&#10;conda activate python38  # 切换虚拟环境&#10;conda remove -n python38 --all # 删除虚拟环境&#10;conda create -n python38 --clone old_python38 # 克隆虚拟环境&#10;conda list # 列出已安装的包&#10;conda env list # 列出所有虚拟环境&#10;&#10;cd /f/d&#10;export HF_ENDPOINT=https://hf-mirror.com&#10;./hfd.sh datxy/file --dataset --local-dir ./dataset&#10;&#10;Get-ChildItem -Recurse -File | Select-String -Pattern # 双引号 Windows 搜索&#10;tracert baidu.cn&#10;grep -rn 'py' /home/&#10;rm -rf /*"></textarea>
            
            <div id="progressOverlay" class="progress-overlay">
                <div class="loader-spinner"></div>
                <span id="progressText">AI 正在绘制图像...</span>
            </div>

            <div id="resultWrapper" class="result-image-wrapper">
                <img id="resultImage" class="result-image" alt="生成的图片">
                <div class="action-row">
                    <button class="btn btn-glass" style="background: rgba(52, 211, 153, 0.2); color: var(--theme-green); border-color: rgba(52, 211, 153, 0.4);" onclick="downloadImage()">⬇️ 保存高清原图</button>
                    <button class="btn btn-glass" onclick="hideImagePreview()">✖ 返回文本区</button>
                </div>
            </div>

            <div class="error-msg" id="errorMsg"></div>

        </div>

        <div class="control-panel">
            
            <div class="glass-card">
                <div class="section-title">
                    <span>✨ AI 图像生成</span>
                    <a href="https://poixe.com/i/realfake" target="_blank" style="color: var(--theme-blue); font-size: 0.75rem; font-weight: normal;">获取 API</a>
                </div>
                <input type="password" id="apiKey" class="glass-input" placeholder="输入 API Key (poixe-xxx)">
                
                <select id="modelSelect" class="glass-input">
                    <option value="gemini-2.5-flash-image">Nano Banana (闪电版)</option>
                    <option value="nano-banana-pro" selected>Nano Banana Pro (高画质)</option>
                </select>
                
                <div class="grid-2" style="grid-template-columns: 1fr 1fr; gap: 10px;">
                    <select id="aspectRatio" class="glass-input">
                        <option value="16:9">16:9 (横屏)</option>
                        <option value="1:1">1:1 (头像)</option>
                        <option value="9:16">9:16 (竖屏)</option>
                        <option value="21:9">21:9 (宽屏)</option>
                    </select>
                    <select id="imageSize" class="glass-input">
                        <option value="2K">2K (2048x2048)</option>
                        <option value="1K" selected>1K (1024x1024)</option>
                        <option value="4K">4K (4096x4096)</option>
                    </select>
                </div>
                
                <textarea id="imagePrompt" class="glass-input" style="min-height: 70px; margin-bottom: 10px;" placeholder="输入图像提示词，例如：赛博朋克风格的橘猫..."></textarea>
                
                <button id="generateBtn" class="btn bg-blue" style="width: 100%; padding: 10px; font-size: 0.95rem;" onclick="generateImage()">🚀 开始生成图像</button>
            </div>

            <div class="glass-card">
                <div class="section-title">查找与替换 (对应左侧文本区)</div>
                <input type="text" id="search-input" class="glass-input" placeholder="输入查找文本或正则" value='https?:\/\/[^\s\/$.?#]+[^\s]*?(?=")'>      
                <input type="text" id="replace-input" class="glass-input" placeholder="输入替换内容 (为空则删除)">

                <div class="btn-grid" style="margin-top: 10px;">
                    <button class="btn btn-glass" id="remove-duplicates-btn">去重</button>
                    <button class="btn btn-glass" id="replace-btn">普通替换</button>
                    <button class="btn btn-glass" id="regex-replace-btn">正则替换</button>
                    <button class="btn btn-glass" id="preserve-matches-btn">正则提取</button>
                    <button class="btn btn-glass" id="copy-btn">复制内容</button>
                    <button class="btn btn-glass" id="paste-btn">粘贴覆盖</button>
                    <button class="btn btn-glass" id="openkey-btn" data-api-url="https://api.poixe.com/v1/chat/completions" style="display:none;">API 测试</button>
                    <button class="btn btn-glass" onclick="formatAndPreview()">预览网页</button>
                    <button class="btn btn-glass" id="clear-btn" style="color: #fca5a5; border-color: rgba(239, 68, 68, 0.3);">清空面板</button>
                </div>
            </div>

            <div class="glass-card">
                <div class="section-title">文本语音朗读 (TTS)</div>
                <label class="tts-checkbox">
                    <input type="checkbox" id="tts-filterChinese" checked> 只显示中文语音
                </label>
                <select id="tts-voiceSelect" class="glass-input"></select>
                
                <div class="tts-row">
                    <span>语速 (<span id="tts-rate-val">1.0x</span>)</span>
                    <input id="tts-rate" type="range" min="0.1" max="10" step="0.1" value="1" />
                </div>
                <div class="tts-row">
                    <span>音调 (<span id="tts-pitch-val">1.0</span>)</span>
                    <input id="tts-pitch" type="range" min="0" max="10" step="0.1" value="1" />
                </div>
                <div class="tts-row">
                    <span>音量 (<span id="tts-volume-val">1.0</span>)</span>
                    <input id="tts-volume" type="range" min="0" max="10" step="0.1" value="1" />
                </div>

                <div style="display: flex; gap: 10px; margin-top: 15px;">
                    <button id="tts-start" class="btn btn-glass" style="flex: 1;">▶ 开始朗读</button>
                    <button id="tts-stop" class="btn btn-glass" style="flex: 1;">■ 停止</button>
                </div>
            </div>
            
        </div>

    </div>

    <script>
        // 1. AI 图像生成逻辑
        window.addEventListener('load', () => { 
            const savedKey = localStorage.getItem('poixe_api_key');
            if(savedKey) document.getElementById('apiKey').value = savedKey;
            
            updateResolutionState();
            document.getElementById('modelSelect').addEventListener('change', updateResolutionState);
            updateStats(); // 初始化文本统计
        });

        function updateResolutionState() {
            const modelSelect = document.getElementById('modelSelect');
            const imageSizeSelect = document.getElementById('imageSize');
            if (modelSelect.value === 'nano-banana-pro') {
                imageSizeSelect.disabled = false; 
            } else {
                imageSizeSelect.disabled = true; 
                imageSizeSelect.value = "1K"; 
            }
        }

        function showError(msg) {
            const errorMsg = document.getElementById('errorMsg');
            errorMsg.innerText = msg;
            errorMsg.style.display = "block";
            setTimeout(() => { errorMsg.style.display = "none"; }, 4000);
        }

        function hideImagePreview() {
            document.getElementById('resultWrapper').style.display = 'none';
        }

        async function generateImage() {
            const rawKey = document.getElementById('apiKey').value;
            const apiKey = rawKey.replace(/[^\x20-\x7E]/g, '').trim();
            const model = document.getElementById('modelSelect').value;
            const prompt = document.getElementById('imagePrompt').value.trim();
            const aspectRatio = document.getElementById('aspectRatio').value.split(' ')[0]; 
            const imageSize = document.getElementById('imageSize').value.split(' ')[0]; 
            
            const generateBtn = document.getElementById('generateBtn');
            const progressOverlay = document.getElementById('progressOverlay');
            const resultWrapper = document.getElementById('resultWrapper');
            const resultImage = document.getElementById('resultImage');

            if (!apiKey) return showError("❌ 请输入 API Key");
            if (!prompt) return showError("❌ 图像提示词不能为空");

            localStorage.setItem('poixe_api_key', apiKey);

            // UI 显示顶层进度条，隐藏图像层露出底层文本
            resultWrapper.style.display = "none";
            progressOverlay.style.display = "flex";
            
            generateBtn.disabled = true;
            generateBtn.innerText = "⏳ 正在绘制中...";

            const requestBody = {
                contents: [ { parts: [ { text: prompt } ] } ],
                generationConfig: {
                    responseModalities: ["Text", "Image"],
                    imageConfig: {
                        aspectRatio: aspectRatio,
                        ...(model === 'nano-banana-pro' && { imageSize: imageSize })
                    }
                }
            };

            try {
                const response = await fetch(`https://api.poixe.com/v1beta/models/${model}:generateContent`, {
                    method: 'POST',
                    headers: { 'x-goog-api-key': apiKey, 'Content-Type': 'application/json' },
                    body: JSON.stringify(requestBody)
                });

                if (!response.ok) {
                    const errData = await response.json().catch(() => ({}));
                    throw new Error(errData.error?.message || `HTTP ${response.status}`);
                }

                const data = await response.json();
                
                if (data.candidates && data.candidates.length > 0) {
                    const parts = data.candidates[0].content.parts;
                    let imageUrl = "";

                    parts.forEach(part => {
                        if (part.inlineData) {
                            const mimeType = part.inlineData.mimeType || "image/png";
                            imageUrl = `data:${mimeType};base64,${part.inlineData.data}`;
                        }
                    });

                    if (imageUrl) {
                        resultImage.src = imageUrl;
                        progressOverlay.style.display = "none";
                        resultWrapper.style.display = "flex"; // 显示图像覆盖层
                    } else {
                        showError("⚠️ 接口响应成功，但未返回图片数据");
                    }
                } else {
                    showError("❌ 未获取到生成结果");
                }

            } catch (error) {
                console.error("生成失败:", error);
                showError("❌ 生成失败: " + error.message);
            } finally {
                progressOverlay.style.display = "none";
                generateBtn.disabled = false;
                generateBtn.innerText = "🚀 开始生成图像";
            }
        }

        function downloadImage() {
            const img = document.getElementById('resultImage');
            if (!img.src) return;
            const link = document.createElement('a');
            link.href = img.src;
            link.download = `DatXY_Vision_${new Date().getTime()}.png`; 
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // 2. 文本处理逻辑 (去除兼容性断言)
        const textarea = document.getElementById("textarea");
        const searchInput = document.getElementById("search-input");
        const replaceInput = document.getElementById("replace-input");
        const totalEl = document.getElementById("total");
        const chineseEl = document.getElementById("chinese");
        const punctuationEl = document.getElementById("punctuation");
        const alphabetEl = document.getElementById("alphabet");
        const numbersEl = document.getElementById("numbers");
        const duplicateEl = document.getElementById("duplicate");

        textarea.addEventListener("input", updateStats);
        document.getElementById("clear-btn").addEventListener("click", () => { textarea.value = ""; updateStats(); });
        
        document.getElementById("remove-duplicates-btn").addEventListener("click", () => {
            const textList = textarea.value.split("\n");
            const uniqueList = [...new Set(textList)];
            document.getElementById("duplicate").innerHTML = `重复：<span>${textList.length - uniqueList.length}</span>`;
            textarea.value = uniqueList.join("\n");
            updateStats();
        });

        document.getElementById("preserve-matches-btn").addEventListener("click", function() {
            try {
                const regex = new RegExp(searchInput.value, 'g');
                let matches = textarea.value.match(regex);
                if (matches && matches.length > 0) {
                    textarea.value = matches.join("\n");
                    document.getElementById("regex-replace-count").innerHTML = `正则：<span>${matches.length}</span>`;
                } else {
                    document.getElementById("regex-replace-count").innerHTML = `正则：<span>0</span>`;
                }
            } catch (e) { alert("正则表达式有误: " + e.message); }
        });

        document.getElementById("replace-btn").addEventListener("click", () => {
            if (searchInput.value !== "") {
                const textArr = textarea.value.split(searchInput.value);
                document.getElementById("replace-count").innerHTML = `替换：<span>${textArr.length - 1}</span>`;
                textarea.value = textArr.join(replaceInput.value); 
                updateStats();
            }
        });

        document.getElementById("regex-replace-btn").addEventListener("click", () => {
            if (searchInput.value !== "") {
                try { 
                    let matchCount = (textarea.value.match(new RegExp(searchInput.value, 'g')) || []).length;
                    textarea.value = textarea.value.replace(new RegExp(searchInput.value, 'g'), replaceInput.value); 
                    document.getElementById("regex-replace-count").innerHTML = `正则：<span>${matchCount}</span>`;
                    updateStats();
                } catch (e) { alert("正则表达式有误: " + e.message); }
            }
        });

        function updateStats() {
            const text = textarea.value;
            totalEl.innerHTML = `总数：<span>${text.length}</span>`;
            chineseEl.innerHTML = `汉字：<span>${(text.match(/[\u4e00-\u9fa5]/g) || []).length}</span>`;
            punctuationEl.innerHTML = `标点：<span>${(text.match(/[^\u4e00-\u9fa5\w]/g) || []).length}</span>`;
            alphabetEl.innerHTML = `字母：<span>${(text.match(/[a-zA-Z]/g) || []).length}</span>`;
            numbersEl.innerHTML = `数字：<span>${(text.match(/\d/g) || []).length}</span>`;
        }

        document.getElementById("copy-btn").addEventListener("click", function() {
            let textToCopy = textarea.value || textarea.getAttribute("placeholder");
            const tempInput = document.createElement("textarea");
            document.body.appendChild(tempInput); tempInput.value = textToCopy; 
            tempInput.select(); document.execCommand("copy"); document.body.removeChild(tempInput);
        });

        document.getElementById("paste-btn").addEventListener("click", function() {
            navigator.clipboard.readText().then(clipText => { textarea.value = clipText; updateStats(); }).catch(err => {});
        });

        // 3. HTML 格式化与预览
        function formatHTML(input) {
            let formatted = ''; let pad = 0; const tags = ['<p>', '</p>', '<div>', '</div>', '<span>', '</span>', '<br>', '<br/>'];
            input.split(/\r?\n/).forEach(line => {
                let indent = 0; tags.forEach(tag => { if (line.includes(tag)) { if (tag.startsWith('</')) { pad -= 1; } } });
                for (let i = 0; i < pad; i++) { indent += 4; }
                formatted += ' '.repeat(indent) + line.trim() + '\n';
                tags.forEach(tag => { if (line.includes(tag)) { if (!tag.startsWith('</')) { pad += 1; } } });
            });
            return formatted;
        }
        function formatAndPreview() {
            const code = document.getElementById('textarea').value; 
            document.getElementById('textarea').value = formatHTML(code); 
            const newWindow = window.open("", "Preview Window", "width=600,height=600"); 
            newWindow.document.write(code); newWindow.document.close();
        }

        // 4. Web Speech Synthesis 集成脚本 (TTS)
        (function() {
            const voiceSelect = document.getElementById('tts-voiceSelect');
            const filterChineseBox = document.getElementById('tts-filterChinese');
            const startBtn = document.getElementById('tts-start');
            const stopBtn = document.getElementById('tts-stop');
            const rateInput = document.getElementById('tts-rate');
            const pitchInput = document.getElementById('tts-pitch');
            const volumeInput = document.getElementById('tts-volume');
            
            let currentQueue = []; let speaking = false;

            function listVoices() {
                const voices = window.speechSynthesis.getVoices();
                voiceSelect.innerHTML = '';
                const onlyZH = filterChineseBox.checked;
                let filtered = onlyZH ? voices.filter(v => v.lang && v.lang.toLowerCase().startsWith('zh')) : voices;
                if (filtered.length === 0) {
                    voiceSelect.innerHTML = '<option disabled>无可用语音（请安装TTS并刷新）</option>'; return;
                }
                filtered.forEach(v => {
                    const opt = document.createElement('option');
                    opt.value = v.name; opt.textContent = `${v.name} (${v.lang})`; voiceSelect.appendChild(opt);
                });
                const saved = localStorage.getItem('tts_voice_name');
                if (saved) {
                    const idx = [...voiceSelect.options].findIndex(o => o.value === saved);
                    if (idx >= 0) voiceSelect.selectedIndex = idx;
                }
            }

            function splitTextToChunks(text) {
                const lines = text.split(/\n+/).map(s => s.trim()).filter(Boolean);
                const chunks = [];
                lines.forEach(line => {
                    const parts = line.match(/[^。！？!?；;\.…]+[。！？!?；;\…]?/g);
                    if (parts) {
                        parts.forEach(p => { if (p.trim()) chunks.push(p.trim()); });
                    } else {
                        chunks.push(line);
                    }
                });
                return chunks.length ? chunks : [text];
            }

            function speakQueue(chunks, voice) {
                speaking = true; currentQueue = chunks.slice();
                const next = () => {
                    if (!speaking || currentQueue.length === 0) { speaking = false; return; }
                    const utt = new SpeechSynthesisUtterance(currentQueue.shift());
                    if (voice) { utt.voice = voice; utt.lang = voice.lang; }
                    utt.rate = parseFloat(rateInput.value || '1');
                    utt.pitch = parseFloat(pitchInput.value || '1');
                    utt.volume = parseFloat(volumeInput.value || '1');
                    utt.onend = next; utt.onerror = () => { next(); };
                    window.speechSynthesis.speak(utt);
                };
                next();
            }

            startBtn.addEventListener('click', () => {
                const text = document.getElementById('textarea').value.trim();
                if (!text) return alert('请输入要朗读的文本');
                const v = window.speechSynthesis.getVoices().find(v => v.name === voiceSelect.value);
                if (!v) return alert('请选择一个有效语音');
                
                // 确保隐藏图像覆盖层露出文本
                hideImagePreview();

                if (speaking) { window.speechSynthesis.cancel(); speaking = false; }
                speakQueue(splitTextToChunks(text), v);
                localStorage.setItem('tts_voice_name', v.name);
            });

            stopBtn.addEventListener('click', () => { speaking = false; window.speechSynthesis.cancel(); });
            filterChineseBox.addEventListener('change', listVoices);
            voiceSelect.addEventListener('change', () => { localStorage.setItem('tts_voice_name', voiceSelect.value); });
            
            rateInput.addEventListener('input', () => document.getElementById('tts-rate-val').textContent = rateInput.value + 'x');
            pitchInput.addEventListener('input', () => document.getElementById('tts-pitch-val').textContent = pitchInput.value);
            volumeInput.addEventListener('input', () => document.getElementById('tts-volume-val').textContent = volumeInput.value);

            listVoices();
            if (typeof window.speechSynthesis !== 'undefined' && typeof window.speechSynthesis.onvoiceschanged !== 'undefined') {
                window.speechSynthesis.onvoiceschanged = listVoices;
            }
        })();
    </script>
