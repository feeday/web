<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>AI 综合工作台 - DatXY</title>
    <link rel="shortcut icon" href="https://github.githubassets.com/favicons/favicon.svg" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ================== 1. 核心变量 ================== */
        :root {
            --bg-body: #020617; 
            --bg-card: rgba(30, 41, 59, 0.6);
            --bg-panel: rgba(15, 23, 42, 0.5);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --text-tertiary: #64748b;
            --border-light: rgba(255, 255, 255, 0.08);
            --border-hover: rgba(255, 255, 255, 0.2);
            --radius-card: 20px;
            --radius-pill: 999px;
            --theme-blue: #38bdf8;
            --theme-green: #34d399;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-body);
            background-image: 
                radial-gradient(circle at 50% -20%, #1e293b 0%, transparent 60%),
                radial-gradient(circle at 50% 10%, rgba(56, 189, 248, 0.05) 0%, transparent 50%);
            background-attachment: fixed;
            color: var(--text-primary);
            line-height: 1.6;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        a { text-decoration: none; color: inherit; transition: 0.2s; }

        /* ================== 2. 顶部导航 ================== */
        .sticky-header-wrapper {
            width: 100%; display: flex; justify-content: center;
            padding: 15px 20px; z-index: 999;
        }
        .filter-bar { 
            display: flex; gap: 4px; align-items: center; background: rgba(0, 0, 0, 0.3); padding: 6px; 
            border-radius: var(--radius-pill); border: 1px solid rgba(255,255,255,0.08); 
            width: 100%; max-width: 1600px; backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
        }
        .tag-btn { 
            background: transparent; border: none; color: var(--text-secondary); 
            padding: 8px 20px; border-radius: var(--radius-pill); font-size: 0.95rem; 
            font-weight: 600; cursor: pointer; transition: all 0.3s; white-space: nowrap; 
        }
        .tag-btn.active { color: #fff; background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.15); box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .tag-btn:hover:not(.active) { color: #fff; background: rgba(255, 255, 255, 0.05); }

        /* ================== 3. 工作台布局 ================== */
        .workspace {
            width: 100%; max-width: 1600px; flex: 1; margin-bottom: 20px;
            background: var(--bg-card); border: 1px solid var(--border-light);
            border-radius: var(--radius-card); box-shadow: 0 30px 60px -15px rgba(0,0,0,0.7);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            display: flex; overflow: hidden; animation: fadeUp 0.6s ease backwards;
        }

        /* 左侧：工作与预览面板 */
        .editor-panel {
            flex: 1; padding: 20px; display: flex; flex-direction: column;
            background: radial-gradient(circle at top left, rgba(30, 41, 59, 0.3) 0%, transparent 70%);
        }

        /* 右侧：控制面板 */
        .control-panel {
            flex: 0 0 400px; padding: 20px 25px; display: flex; flex-direction: column; gap: 20px;
            border-left: 1px solid var(--border-light); background: var(--bg-panel);
            overflow-y: auto;
        }
        .control-panel::-webkit-scrollbar { width: 6px; }
        .control-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }

        /* ================== 4. UI 控件样式 ================== */
        .section-title { font-size: 0.85rem; font-weight: 700; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center;}
        
        .glass-card { background: rgba(0, 0, 0, 0.2); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 12px; padding: 15px; }

        .glass-input { 
            width: 100%; background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 8px; color: var(--text-primary); padding: 10px 12px; font-family: inherit; 
            font-size: 0.9rem; transition: all 0.3s; margin-bottom: 10px;
        }
        .glass-input::placeholder { color: rgba(148, 163, 184, 0.4); }
        .glass-input:focus { background: rgba(15, 23, 42, 0.9); border-color: rgba(56, 189, 248, 0.5); box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.15); }
        
        select.glass-input { 
            appearance: none; -webkit-appearance: none; 
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2394a3b8' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e"); 
            background-repeat: no-repeat; background-position: right 12px center; background-size: 16px; padding-right: 35px; cursor: pointer; 
        }
        select.glass-input option { background-color: #0f172a; color: #fff; }
        select.glass-input:disabled { background-color: rgba(255, 255, 255, 0.02); color: var(--text-tertiary); cursor: not-allowed; border-color: transparent; }

        /* 文件上传按钮特别处理 */
        input[type="file"].glass-input { padding: 6px 12px; color: var(--text-secondary); cursor: pointer; }
        input[type="file"]::file-selector-button { background: rgba(255,255,255,0.1); border: none; padding: 6px 12px; border-radius: 6px; color: #fff; margin-right: 10px; cursor: pointer; transition: 0.2s;}
        input[type="file"]::file-selector-button:hover { background: rgba(255,255,255,0.2); }

        /* 统一简约按钮风格 */
        .btn-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .btn { 
            padding: 8px 10px; border-radius: 8px; font-size: 0.85rem; font-weight: 600; 
            cursor: pointer; transition: all 0.2s; text-align: center; border: none; display: inline-flex; align-items: center; justify-content: center; gap: 6px;
        }
        .btn:active { transform: translateY(0); }
        
        .btn-glass {
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); color: var(--text-primary);
        }
        .btn-glass:hover {
            background: rgba(255, 255, 255, 0.15); border-color: rgba(255, 255, 255, 0.25);
            color: #fff; transform: translateY(-2px); box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        
        .bg-blue { background: var(--theme-blue); color: #0f172a; border: none;}
        .bg-blue:hover { background: #7dd3fc; color: #0f172a; transform: translateY(-2px); box-shadow: 0 4px 15px rgba(56, 189, 248, 0.4);}
        .bg-blue:disabled { background: rgba(255,255,255,0.1); color: var(--text-tertiary); box-shadow: none; cursor: not-allowed; transform: none; }

        /* TTS 样式 */
        .tts-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; font-size: 0.85rem; color: var(--text-secondary); }
        .tts-row input[type="range"] { width: 60%; accent-color: var(--theme-blue); }
        .tts-checkbox { display: flex; align-items: center; gap: 8px; font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 10px;}
        input[type="checkbox"] { accent-color: var(--theme-blue); width: 16px; height: 16px; cursor: pointer; }

        /* ================== 5. 左侧内容区 & Tab 切换 ================== */
        .editor-tabs { display: flex; gap: 10px; margin-bottom: 15px; }
        .editor-tab { 
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            color: var(--text-secondary); padding: 8px 20px; border-radius: 8px;
            cursor: pointer; font-size: 0.9rem; font-weight: 600; transition: 0.2s;
        }
        .editor-tab.active { background: var(--theme-blue); color: #0f172a; border-color: var(--theme-blue); }
        .editor-tab:hover:not(.active) { background: rgba(255,255,255,0.1); color: #fff; }
        
        .workspace-view { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative;}

        /* 视图 1：文本视图 */
        #stats { 
            display: flex; flex-wrap: wrap; gap: 10px; padding: 12px 20px; margin-bottom: 15px;
            background: rgba(0, 0, 0, 0.2); border: 1px solid rgba(255,255,255,0.05); 
            border-radius: 12px;
        }
        #stats div { font-size: 0.85rem; font-weight: 600; color: var(--theme-blue); background: rgba(56, 189, 248, 0.1); padding: 4px 12px; border-radius: 6px; }
        #stats div span { color: #fff; margin-left: 4px; } 

        #textarea { 
            flex: 1; height: 100%; resize: none; background: rgba(0, 0, 0, 0.3); 
            border: 1px solid var(--border-light); border-radius: 12px; padding: 20px; 
            color: var(--text-primary); font-family: monospace; font-size: 0.95rem; line-height: 1.6;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.2); transition: border-color 0.3s;
        }
        #textarea:focus { border-color: rgba(56, 189, 248, 0.4); outline: none; }

        /* 视图 2：图像生成预览 */
        .preview-placeholder { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--text-tertiary); gap: 15px; }
        .preview-placeholder svg { width: 64px; height: 64px; opacity: 0.2; }
        
        .result-image-wrapper { width: 100%; height: 100%; display: none; flex-direction: column; align-items: center; justify-content: center; position: relative;}
        .result-image { max-width: 100%; max-height: calc(100% - 80px); object-fit: contain; border-radius: 12px; box-shadow: 0 20px 40px rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.1); }

        /* 视图 3：媒体解析与抽帧预览 */
        .media-image-display { max-width: 100%; max-height: calc(100% - 100px); object-fit: contain; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); }
        .media-time { color: var(--text-secondary); margin-top: 10px; font-size: 0.85rem; }
        #mediaPlayerWrapper video, #mediaPlayerWrapper audio { max-width: 100%; max-height: 50vh; border-radius: 12px; outline: none; }

        /* 进度提示与弹窗 */
        .progress-overlay {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(15, 23, 42, 0.85); border: 1px solid var(--theme-blue);
            padding: 10px 25px; border-radius: 30px; display: none; align-items: center; gap: 10px;
            color: var(--theme-blue); font-weight: 600; font-size: 0.9rem; z-index: 20;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
        }
        .loader-spinner { width: 18px; height: 18px; border: 2px solid rgba(56, 189, 248, 0.3); border-top-color: var(--theme-blue); border-radius: 50%; animation: spin 1s linear infinite; }
        
        .error-msg { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.3); color: #fca5a5; padding: 12px 24px; border-radius: 8px; font-weight: 500; font-size: 0.9rem; display: none; z-index: 30;}

        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 1024px) {
            .workspace { flex-direction: column-reverse; overflow-y: auto; }
            .control-panel { flex: none; border-left: none; border-top: 1px solid var(--border-light); width: 100%;}
            #textarea { height: 400px; flex: none; }
            .result-image-wrapper { height: 400px; }
        }
    </style>
</head>
<body>

    <div class="sticky-header-wrapper">
        <div class="filter-bar">
            <button class="tag-btn active" style="cursor: default;">✨ 综合 AI 工作台</button>
            <button class="tag-btn" onclick="window.location.href='/'" style="margin-left: auto;">返回主页 ➔</button>
        </div>
    </div>

    <div class="workspace">
        
        <div class="editor-panel">
            
            <div class="editor-tabs">
                <button class="editor-tab active" id="tab-text" onclick="switchTab('text')">📝 文本处理区</button>
                <button class="editor-tab" id="tab-image" onclick="switchTab('image')">🖼️ 图像生成区</button>
                <button class="editor-tab" id="tab-media" onclick="switchTab('media')">🎬 媒体解析区</button>
            </div>

            <div id="progressOverlay" class="progress-overlay">
                <div class="loader-spinner"></div>
                <span id="progressText">处理中...</span>
            </div>
            <div class="error-msg" id="errorMsg"></div>

            <div id="view-text" class="workspace-view" style="display: flex;">
                <div id="stats">
                    <div id="total">总数：<span>0</span></div>
                    <div id="chinese">汉字：<span>0</span></div>
                    <div id="punctuation">标点：<span>0</span></div>
                    <div id="alphabet">字母：<span>0</span></div>
                    <div id="numbers">数字：<span>0</span></div>
                    <div id="duplicate">重复：<span>0</span></div>
                    <div id="replace-count">替换：<span>0</span></div>
                    <div id="regex-replace-count">正则：<span>0</span></div>
                </div>
                <textarea id="textarea" placeholder="在这里输入文本、正则规则或 Base64 数据..."></textarea>
            </div>

            <div id="view-image" class="workspace-view" style="display: none; align-items: center; justify-content: center;">
                <div class="preview-placeholder" id="imagePlaceholder">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                    <p>AI 图像将在这里呈现</p>
                </div>
                <div class="result-image-wrapper" id="aiResultWrapper">
                    <img id="aiResultImage" class="result-image" alt="生成的图片">
                    <div style="margin-top: 15px;">
                        <button class="btn btn-glass" style="color: var(--theme-green); border-color: rgba(52, 211, 153, 0.3);" onclick="downloadAiImage()">⬇️ 保存高清原图</button>
                    </div>
                </div>
            </div>

            <div id="view-media" class="workspace-view" style="display: none; align-items: center; justify-content: center;">
                <div class="preview-placeholder" id="mediaPlaceholder">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polygon points="23 7 16 12 23 17 23 7"></polygon><rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect></svg>
                    <p>媒体预览与抽帧结果区</p>
                </div>
                
                <div id="mediaPlayerContainer" style="display: none; flex-direction: column; align-items: center; width: 100%;">
                    <div id="mediaPlayerWrapper" style="display:flex; justify-content:center; align-items:center; width:100%; margin-bottom: 20px;"></div>
                    <button class="btn btn-glass" id="btnDownloadMedia" style="color: var(--theme-green);">⬇️ 下载媒体文件</button>
                </div>

                <div id="frameDisplayContainer" style="display: none; flex-direction: column; align-items: center; width: 100%; height: 100%;">
                    <img id="frameDisplayedImage" class="media-image-display" src="" alt="Extracted Frame" />
                    <div id="frameTimeLabel" class="media-time"></div>
                    
                    <div id="frameControls" style="display: none; gap: 10px; margin-top: 15px;">
                        <button class="btn btn-glass" id="prevButton">⬅️ 上一帧</button>
                        <button class="btn btn-glass" id="btnDownloadFrame" style="color: var(--theme-green);">⬇️ 保存此帧</button>
                        <button class="btn btn-glass" id="nextButton">下一帧 ➡️</button>
                    </div>
                    <div id="framePager" style="color: var(--text-tertiary); font-size: 0.8rem; margin-top: 5px; display: none;">0 / 0</div>
                    
                    <div id="editButtons" style="display: flex; gap: 10px; margin-top: 15px;">
                        <button class="btn btn-glass" id="btnInvert">反色处理</button>
                        <button class="btn btn-glass" id="btnGray">去色黑白</button>
                        <button class="btn btn-glass" id="btnRestore">效果还原</button>
                        <button class="btn btn-glass" id="btnDownloadEditedImage">保存图像</button>
                    </div>
                </div>
            </div>

        </div>

        <div class="control-panel">
            
            <div class="glass-card">
                <div class="section-title">
                    <span>🔑 全局 API 密钥</span>
                    <a href="https://poixe.com/i/realfake" target="_blank" style="color: var(--theme-blue); font-size: 0.75rem; font-weight: normal;">获取 API</a>
                </div>
                <input type="password" id="globalApiKey" class="glass-input" placeholder="输入密钥，例: poixe-xxx" style="margin-bottom: 0;">
            </div>

            <div class="glass-card">
                <div class="section-title">💬 AI 文本对话 (交互左侧文本区)</div>
                <select id="textModelSelect" class="glass-input">
                    <option value="gemini-3.1-pro-preview">gemini-3.1-pro-preview</option>
                    <option value="gpt-5.4-pro-2026-03-05">gpt-5.4-pro-2026-03-05</option>
                    <option value="deepseek-v3-250324:free">deepseek-v3-250324:free</option>
                </select>
                <button id="openkey-btn" class="btn bg-blue" style="width: 100%; padding: 10px; font-size: 0.95rem;">🤖 发送文本请求</button>
            </div>

            <div class="glass-card">
                <div class="section-title">✨ AI 图像生成</div>
                <select id="imageModelSelect" class="glass-input">
                    <option value="gemini-2.5-flash-image">Nano Banana (闪电版)</option>
                    <option value="nano-banana-pro" selected>Nano Banana Pro (高画质)</option>
                </select>
                
                <div class="grid-2" style="grid-template-columns: 1fr 1fr; gap: 10px;">
                    <select id="aspectRatio" class="glass-input">
                        <option value="16:9">16:9 (横屏)</option>
                        <option value="1:1">1:1 (头像)</option>
                        <option value="9:16">9:16 (竖屏)</option>
                        <option value="21:9">21:9 (宽屏)</option>
                    </select>
                    <select id="imageSize" class="glass-input">
                        <option value="2K">2K (2048x2048)</option>
                        <option value="1K" selected>1K (1024x1024)</option>
                        <option value="4K">4K (4096x4096)</option>
                    </select>
                </div>
                
                <textarea id="imagePrompt" class="glass-input" style="min-height: 60px; margin-bottom: 10px;" placeholder="输入图像提示词，例如：赛博朋克风格的橘猫..."></textarea>
                <button id="generateBtn" class="btn bg-blue" style="width: 100%; padding: 10px; font-size: 0.95rem;">🚀 开始绘制图像</button>
            </div>

            <div class="glass-card">
                <div class="section-title">📦 文件转码 & 视频抽帧</div>
                <input type="file" id="fileInput" class="glass-input" accept="image/*,audio/*,video/*">
                <input type="number" id="intervalInput" class="glass-input" min="1" placeholder="视频抽帧：输入提取帧率 (FPS)">
                
                <div class="btn-grid" style="grid-template-columns: 1fr 1fr;">
                    <button class="btn btn-glass" id="btnToB64">文件 ➔ Base64</button>
                    <button class="btn btn-glass" id="btnFromB64">Base64 ➔ 媒体</button>
                    <button class="btn btn-glass" id="btnFrames">🎞️ 提取视频帧</button>
                    <button class="btn btn-glass" id="btnClearOutput" style="color: #fca5a5; border-color: rgba(239,68,68,0.3);">🗑️ 清除缓存</button>
                </div>
            </div>

            <div class="glass-card">
                <div class="section-title">🔍 查找与替换</div>
                <input type="text" id="search-input" class="glass-input" placeholder="输入查找文本或正则" value='https?:\/\/[^\s\/$.?#]+[^\s]*?(?=")'>      
                <input type="text" id="replace-input" class="glass-input" placeholder="输入替换内容 (为空则删除)">

                <div class="btn-grid" style="grid-template-columns: repeat(3, 1fr);">
                    <button class="btn btn-glass" id="remove-duplicates-btn">去重行</button>
                    <button class="btn btn-glass" id="replace-btn">普通替换</button>
                    <button class="btn btn-glass" id="regex-replace-btn">正则替换</button>
                    <button class="btn btn-glass" id="preserve-matches-btn">正则提取</button>
                    <button class="btn btn-glass" id="copy-btn">复制文本</button>
                    <button class="btn btn-glass" id="paste-btn">粘贴覆盖</button>
                </div>
            </div>

            <div class="glass-card">
                <div class="section-title">📢 文本语音朗读 (TTS)</div>
                <label class="tts-checkbox">
                    <input type="checkbox" id="tts-filterChinese" checked> 只显示中文语音
                </label>
                <select id="tts-voiceSelect" class="glass-input"></select>
                
                <div class="tts-row">
                    <span>语速 (<span id="tts-rate-val">1.0x</span>)</span>
                    <input id="tts-rate" type="range" min="0.1" max="10" step="0.1" value="1" />
                </div>
                <div class="tts-row">
                    <span>音调 (<span id="tts-pitch-val">1.0</span>)</span>
                    <input id="tts-pitch" type="range" min="0" max="10" step="0.1" value="1" />
                </div>
                <div class="tts-row">
                    <span>音量 (<span id="tts-volume-val">1.0</span>)</span>
                    <input id="tts-volume" type="range" min="0" max="10" step="0.1" value="1" />
                </div>

                <div style="display: flex; gap: 10px; margin-top: 15px;">
                    <button id="tts-start" class="btn btn-glass" style="flex: 1; color: var(--theme-green); border-color: rgba(52, 211, 153, 0.3);">▶ 开始朗读</button>
                    <button id="tts-stop" class="btn btn-glass" style="flex: 1; color: #fca5a5; border-color: rgba(239,68,68,0.3);">■ 停止</button>
                </div>
            </div>
            
        </div>

    </div>

    <script>
        /* ===== 0. 全局状态与基础配置 ===== */
        let extractedImages = [];
        let currentImageIndex = -1;
        let currentMediaImage = null;
        let currentFilter = "";
        let currentMediaDataURL = "";
        let isFrameMode = false;

        window.addEventListener('load', () => { 
            const savedKey = localStorage.getItem('datxy_global_api_key');
            if(savedKey) document.getElementById('globalApiKey').value = savedKey;
            
            updateResolutionState();
            document.getElementById('imageModelSelect').addEventListener('change', updateResolutionState);
            updateStats(); 
        });

        document.getElementById('globalApiKey').addEventListener('change', (e) => {
            localStorage.setItem('datxy_global_api_key', e.target.value.trim());
        });

        function switchTab(tabId) {
            document.querySelectorAll('.editor-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.workspace-view').forEach(v => v.style.display = 'none');
            
            document.getElementById('tab-' + tabId).classList.add('active');
            document.getElementById('view-' + tabId).style.display = 'flex';
        }

        function showOverlay(msg) {
            const overlay = document.getElementById('progressOverlay');
            document.getElementById('progressText').innerText = msg;
            overlay.style.display = "flex";
        }
        function hideOverlay() {
            document.getElementById('progressOverlay').style.display = "none";
        }
        function showError(msg) {
            const errorMsg = document.getElementById('errorMsg');
            errorMsg.innerText = msg;
            errorMsg.style.display = "block";
            setTimeout(() => { errorMsg.style.display = "none"; }, 4000);
        }

        /* ===== 1. AI 文本测试 (调用 API) ===== */
        document.getElementById('openkey-btn').addEventListener('click', async () => {
            const apiKey = document.getElementById('globalApiKey').value.trim();
            const model = document.getElementById('textModelSelect').value;
            const text = document.getElementById('textarea').value.trim();
            const btn = document.getElementById('openkey-btn');

            if (!apiKey) return showError("❌ 请在顶部输入全局 API Key");
            if (!text) return showError("❌ 请在左侧文本区输入请求内容");

            localStorage.setItem('datxy_global_api_key', apiKey);
            switchTab('text');
            showOverlay("AI 正在思考中...");
            btn.disabled = true;
            btn.innerText = "⏳ 请求中...";

            try {
                const res = await fetch("https://api.poixe.com/v1/chat/completions", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${apiKey}` },
                    body: JSON.stringify({
                        model: model,
                        messages: [
                            { role: "system", content: "简要回复，字符不超500个。" },
                            { role: "user", content: text }
                        ],
                        temperature: 0.7
                    })
                });
                
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const result = await res.json();
                
                if (result.choices && result.choices[0]) {
                    document.getElementById('textarea').value = result.choices[0].message.content;
                } else {
                    document.getElementById('textarea').value = JSON.stringify(result, null, 2);
                }
                updateStats();
            } catch(e) {
                showError("❌ 请求失败: " + e.message);
            } finally {
                hideOverlay();
                btn.disabled = false;
                btn.innerText = "🤖 发送文本请求";
            }
        });

        /* ===== 2. AI 图像生成 ===== */
        function updateResolutionState() {
            const modelSelect = document.getElementById('imageModelSelect');
            const imageSizeSelect = document.getElementById('imageSize');
            imageSizeSelect.disabled = (modelSelect.value !== 'nano-banana-pro');
        }

        document.getElementById('generateBtn').addEventListener('click', async () => {
            const apiKey = document.getElementById('globalApiKey').value.trim();
            const model = document.getElementById('imageModelSelect').value;
            const prompt = document.getElementById('imagePrompt').value.trim();
            const aspectRatio = document.getElementById('aspectRatio').value.split(' ')[0]; 
            const imageSize = document.getElementById('imageSize').value.split(' ')[0]; 
            const btn = document.getElementById('generateBtn');

            if (!apiKey) return showError("❌ 请在顶部输入全局 API Key");
            if (!prompt) return showError("❌ 图像提示词不能为空");

            localStorage.setItem('datxy_global_api_key', apiKey);
            switchTab('image');
            
            document.getElementById('imagePlaceholder').style.display = "none";
            document.getElementById('aiResultWrapper').style.display = "none";
            showOverlay("AI 正在绘制图像...");
            
            btn.disabled = true;
            btn.innerText = "⏳ 正在绘制中...";

            const requestBody = {
                contents: [ { parts: [ { text: prompt } ] } ],
                generationConfig: {
                    responseModalities: ["Text", "Image"],
                    imageConfig: { aspectRatio: aspectRatio, ...(model === 'nano-banana-pro' && { imageSize: imageSize }) }
                }
            };

            try {
                const response = await fetch(`https://api.poixe.com/v1beta/models/${model}:generateContent`, {
                    method: 'POST',
                    headers: { 'x-goog-api-key': apiKey, 'Content-Type': 'application/json' },
                    body: JSON.stringify(requestBody)
                });

                if (!response.ok) {
                    const errData = await response.json().catch(() => ({}));
                    throw new Error(errData.error?.message || `HTTP ${response.status}`);
                }

                const data = await response.json();
                if (data.candidates && data.candidates.length > 0) {
                    let imageUrl = "";
                    data.candidates[0].content.parts.forEach(part => {
                        if (part.inlineData) {
                            imageUrl = `data:${part.inlineData.mimeType || 'image/png'};base64,${part.inlineData.data}`;
                        }
                    });

                    if (imageUrl) {
                        document.getElementById('aiResultImage').src = imageUrl;
                        document.getElementById('aiResultWrapper').style.display = "flex";
                    } else {
                        showError("⚠️ 未返回图片数据");
                        document.getElementById('imagePlaceholder').style.display = "flex";
                    }
                } else {
                    showError("❌ 未获取到生成结果");
                    document.getElementById('imagePlaceholder').style.display = "flex";
                }
            } catch (error) {
                showError("❌ 生成失败: " + error.message);
                document.getElementById('imagePlaceholder').style.display = "flex";
            } finally {
                hideOverlay();
                btn.disabled = false;
                btn.innerText = "🚀 开始绘制图像";
            }
        });

        function downloadAiImage() {
            const img = document.getElementById('aiResultImage');
            if (!img.src) return;
            const link = document.createElement('a');
            link.href = img.src;
            link.download = `DatXY_Vision_${new Date().getTime()}.png`; 
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        /* ===== 3. 文件转码与媒体解析 ===== */
        function parseMimeFromDataURI(dataURI) {
            const m = /^data:([^;,]+)[^,]*,/.exec(dataURI);
            return m ? m[1].trim() : '';
        }

        document.getElementById('btnToB64').addEventListener('click', () => {
            const file = document.getElementById('fileInput').files[0];
            if(!file) return showError('❌ 请选择一个文件');
            
            showOverlay('转码 Base64 中...');
            const reader = new FileReader();
            reader.onload = e => {
                document.getElementById('textarea').value = e.target.result;
                switchTab('text');
                updateStats();
                hideOverlay();
            };
            reader.onerror = () => { showError("❌ 文件读取失败"); hideOverlay(); };
            reader.readAsDataURL(file);
        });

        document.getElementById('btnFromB64').addEventListener('click', () => {
            const s = document.getElementById('textarea').value.trim();
            if(!s || !s.startsWith('data:')) return showError('❌ 请在文本区提供有效的 Base64 DataURI');

            const mime = parseMimeFromDataURI(s);
            if(!mime) return showError('❌ 无法解析 MIME 类型');

            switchTab('media');
            document.getElementById('mediaPlaceholder').style.display = 'none';
            const playerContainer = document.getElementById('mediaPlayerContainer');
            const frameContainer = document.getElementById('frameDisplayContainer');
            const wrapper = document.getElementById('mediaPlayerWrapper');

            // Reset
            wrapper.innerHTML = "";
            playerContainer.style.display = 'none';
            frameContainer.style.display = 'none';
            currentFilter = '';
            isFrameMode = false;

            if(mime.startsWith('image/')){
                const img = document.getElementById('frameDisplayedImage');
                img.src = s;
                currentMediaImage = img;
                img.style.filter = currentFilter;
                document.getElementById('frameControls').style.display = 'none';
                document.getElementById('framePager').style.display = 'none';
                document.getElementById('frameTimeLabel').textContent = '';
                frameContainer.style.display = 'flex';
            } else if(mime.startsWith('audio/') || mime.startsWith('video/')){
                const media = document.createElement(mime.startsWith('audio/') ? 'audio' : 'video');
                media.controls = true; media.src = s; media.preload = 'metadata';
                wrapper.appendChild(media);
                currentMediaDataURL = s;
                playerContainer.style.display = 'flex';
            } else {
                showError("⚠️ 不支持预览的媒体格式，保留在文本区");
                switchTab('text');
            }
        });

        document.getElementById('btnDownloadMedia').addEventListener('click', () => {
            if(!currentMediaDataURL) return;
            const mime = parseMimeFromDataURI(currentMediaDataURL);
            const ext = mime.includes('audio/') ? 'mp3' : mime.includes('video/') ? 'mp4' : 'bin';
            const a = document.createElement('a');
            a.href = currentMediaDataURL; a.download = `media_decode.${ext}`; a.click();
        });

        // 视频抽帧逻辑
        function seekTo(vid, t) {
            return new Promise(resolve => {
                const handler = () => { vid.removeEventListener('seeked', handler); resolve(); };
                vid.addEventListener('seeked', handler, { once: true });
                vid.currentTime = Math.min(t, Math.max(0, vid.duration - 0.001));
            });
        }

        document.getElementById('btnFrames').addEventListener('click', async () => {
            const file = document.getElementById('fileInput').files[0];
            const fps = parseInt(document.getElementById('intervalInput').value, 10);
            
            if(!file || !file.type.startsWith('video/')) return showError('❌ 请在上方选择一个视频文件');
            if(isNaN(fps) || fps <= 0) return showError('❌ 请输入有效的抽帧率 (FPS)');

            showOverlay('提取视频帧中...');
            const objectURL = URL.createObjectURL(file);
            const video = document.createElement('video');
            video.preload = 'metadata'; video.src = objectURL;

            video.onloadedmetadata = async () => {
                extractedImages = [];
                currentImageIndex = -1;
                currentFilter = '';
                isFrameMode = true;

                switchTab('media');
                document.getElementById('mediaPlaceholder').style.display = 'none';
                document.getElementById('mediaPlayerContainer').style.display = 'none';
                document.getElementById('frameDisplayContainer').style.display = 'flex';
                document.getElementById('frameControls').style.display = 'flex';
                document.getElementById('framePager').style.display = 'block';

                const frameDuration = 1 / fps;
                const total = Math.floor(video.duration * fps) + 1;
                let currentTime = 0;

                for(let i=0; i<total; i++){
                    await seekTo(video, currentTime);
                    const canvas = document.createElement('canvas');
                    canvas.width = video.videoWidth; canvas.height = video.videoHeight;
                    const ctx = canvas.getContext('2d'); ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                    extractedImages.push({ url: canvas.toDataURL('image/png'), time: currentTime });
                    document.getElementById('progressText').innerText = `抽帧中: ${i+1}/${total}`;
                    currentTime += frameDuration;
                }
                
                hideOverlay();
                if(extractedImages.length > 0){
                    currentImageIndex = 0; displayExtractedFrame();
                } else {
                    showError('❌ 未能提取到任何帧');
                }
            };
        });

        function displayExtractedFrame() {
            if(currentImageIndex < 0 || currentImageIndex >= extractedImages.length) return;
            const f = extractedImages[currentImageIndex];
            const img = document.getElementById('frameDisplayedImage');
            img.src = f.url;
            currentMediaImage = img;
            img.style.filter = currentFilter;
            document.getElementById('frameTimeLabel').textContent = `时间轴: ${f.time.toFixed(2)} 秒`;
            document.getElementById('framePager').textContent = `${currentImageIndex + 1} / ${extractedImages.length}`;
        }

        document.getElementById('prevButton').addEventListener('click', () => { if(currentImageIndex > 0) { currentImageIndex--; displayExtractedFrame(); } });
        document.getElementById('nextButton').addEventListener('click', () => { if(currentImageIndex < extractedImages.length - 1) { currentImageIndex++; displayExtractedFrame(); } });
        document.getElementById('btnDownloadFrame').addEventListener('click', () => {
            if(extractedImages.length === 0) return;
            const f = extractedImages[currentImageIndex];
            const a = document.createElement('a'); a.href = f.url; a.download = `frame_${String(currentImageIndex+1).padStart(4,'0')}.png`; a.click();
        });

        // 图像滤镜
        document.getElementById('btnInvert').addEventListener('click', () => { currentFilter = (currentFilter + ' invert(1)').trim(); if(currentMediaImage) currentMediaImage.style.filter = currentFilter; });
        document.getElementById('btnGray').addEventListener('click', () => { currentFilter = (currentFilter + ' grayscale(1)').trim(); if(currentMediaImage) currentMediaImage.style.filter = currentFilter; });
        document.getElementById('btnRestore').addEventListener('click', () => { currentFilter = ''; if(currentMediaImage) currentMediaImage.style.filter = currentFilter; });
        document.getElementById('btnDownloadEditedImage').addEventListener('click', () => {
            if(!currentMediaImage || !currentMediaImage.src) return;
            const canvas = document.createElement('canvas'); const ctx = canvas.getContext('2d');
            const w = currentMediaImage.naturalWidth || currentMediaImage.width; 
            const h = currentMediaImage.naturalHeight || currentMediaImage.height;
            canvas.width = w; canvas.height = h; ctx.filter = currentFilter || 'none'; 
            ctx.drawImage(currentMediaImage, 0, 0, w, h);
            const a = document.createElement('a'); a.href = canvas.toDataURL('image/png'); a.download = 'processed_image.png'; a.click();
        });

        document.getElementById('btnClearOutput').addEventListener('click', () => {
            document.getElementById('textarea').value = ""; updateStats();
            document.getElementById('fileInput').value = "";
            extractedImages = []; currentImageIndex = -1; currentMediaImage = null; currentFilter = '';
            document.getElementById('mediaPlaceholder').style.display = 'flex';
            document.getElementById('mediaPlayerContainer').style.display = 'none';
            document.getElementById('frameDisplayContainer').style.display = 'none';
            document.getElementById('mediaPlayerWrapper').innerHTML = '';
            switchTab('text');
        });

        /* ===== 4. 文本正则与编辑区 ===== */
        const textarea = document.getElementById("textarea");
        const searchInput = document.getElementById("search-input");
        const replaceInput = document.getElementById("replace-input");

        textarea.addEventListener("input", updateStats);
        
        document.getElementById("remove-duplicates-btn").addEventListener("click", () => {
            const textList = textarea.value.split("\n");
            const uniqueList = [...new Set(textList)];
            textarea.value = uniqueList.join("\n");
            updateStats();
        });

        document.getElementById("preserve-matches-btn").addEventListener("click", function() {
            try {
                const regex = new RegExp(searchInput.value, 'g');
                let matches = textarea.value.match(regex);
                if (matches && matches.length > 0) {
                    textarea.value = matches.join("\n");
                    document.getElementById("regex-replace-count").innerHTML = `正则：<span>${matches.length}</span>`;
                } else {
                    document.getElementById("regex-replace-count").innerHTML = `正则：<span>0</span>`;
                }
                updateStats(); // Force update other stats too
            } catch (e) { showError("❌ 正则表达式有误"); }
        });

        document.getElementById("replace-btn").addEventListener("click", () => {
            if (searchInput.value !== "") {
                const textArr = textarea.value.split(searchInput.value);
                document.getElementById("replace-count").innerHTML = `替换：<span>${textArr.length - 1}</span>`;
                textarea.value = textArr.join(replaceInput.value); 
                updateStats();
            }
        });

        document.getElementById("regex-replace-btn").addEventListener("click", () => {
            if (searchInput.value !== "") {
                try { 
                    let matchCount = (textarea.value.match(new RegExp(searchInput.value, 'g')) || []).length;
                    textarea.value = textarea.value.replace(new RegExp(searchInput.value, 'g'), replaceInput.value); 
                    document.getElementById("regex-replace-count").innerHTML = `正则：<span>${matchCount}</span>`;
                    updateStats();
                } catch (e) { showError("❌ 正则表达式有误"); }
            }
        });

        function updateStats() {
            const text = textarea.value;
            document.getElementById("total").innerHTML = `总数：<span>${text.length}</span>`;
            document.getElementById("chinese").innerHTML = `汉字：<span>${(text.match(/[\u4e00-\u9fa5]/g) || []).length}</span>`;
            document.getElementById("punctuation").innerHTML = `标点：<span>${(text.match(/[^\u4e00-\u9fa5\w]/g) || []).length}</span>`;
            document.getElementById("alphabet").innerHTML = `字母：<span>${(text.match(/[a-zA-Z]/g) || []).length}</span>`;
            document.getElementById("numbers").innerHTML = `数字：<span>${(text.match(/\d/g) || []).length}</span>`;
            
            // Duplicate rows count
            const lines = text.split('\n'); const map = new Map(); let dup=0;
            for(const line of lines){ if(line) map.set(line,(map.get(line)||0)+1); }
            for(const cnt of map.values()){ if(cnt>1) dup += (cnt-1); }
            document.getElementById("duplicate").innerHTML = `重复行：<span>${dup}</span>`;
        }

        document.getElementById("copy-btn").addEventListener("click", function() {
            let textToCopy = textarea.value || textarea.getAttribute("placeholder");
            const tempInput = document.createElement("textarea");
            document.body.appendChild(tempInput); tempInput.value = textToCopy; 
            tempInput.select(); document.execCommand("copy"); document.body.removeChild(tempInput);
            showError("✅ 复制成功！"); // Actually a success message, reused error box for convenience
            document.getElementById('errorMsg').style.background = 'rgba(52, 211, 153, 0.1)';
            document.getElementById('errorMsg').style.color = '#6ee7b7';
            document.getElementById('errorMsg').style.borderColor = 'rgba(52, 211, 153, 0.3)';
        });

        document.getElementById("paste-btn").addEventListener("click", function() {
            navigator.clipboard.readText().then(clipText => { textarea.value = clipText; updateStats(); }).catch(err => {});
        });

        /* ===== 5. Web Speech Synthesis (TTS) ===== */
        (function() {
            const voiceSelect = document.getElementById('tts-voiceSelect');
            const filterChineseBox = document.getElementById('tts-filterChinese');
            const startBtn = document.getElementById('tts-start');
            const stopBtn = document.getElementById('tts-stop');
            const rateInput = document.getElementById('tts-rate');
            const pitchInput = document.getElementById('tts-pitch');
            const volumeInput = document.getElementById('tts-volume');
            
            let currentQueue = []; let speaking = false;

            function listVoices() {
                const voices = window.speechSynthesis.getVoices();
                voiceSelect.innerHTML = '';
                const onlyZH = filterChineseBox.checked;
                let filtered = onlyZH ? voices.filter(v => v.lang && v.lang.toLowerCase().startsWith('zh')) : voices;
                if (filtered.length === 0) {
                    voiceSelect.innerHTML = '<option disabled>无可用语音（请安装TTS并刷新）</option>'; return;
                }
                filtered.forEach(v => {
                    const opt = document.createElement('option');
                    opt.value = v.name; opt.textContent = `${v.name} (${v.lang})`; voiceSelect.appendChild(opt);
                });
                const saved = localStorage.getItem('tts_voice_name');
                if (saved) {
                    const idx = [...voiceSelect.options].findIndex(o => o.value === saved);
                    if (idx >= 0) voiceSelect.selectedIndex = idx;
                }
            }

            function splitTextToChunks(text) {
                const lines = text.split(/\n+/).map(s => s.trim()).filter(Boolean);
                const chunks = [];
                lines.forEach(line => {
                    const parts = line.match(/[^。！？!?；;\.…]+[。！？!?；;\…]?/g);
                    if (parts) {
                        parts.forEach(p => { if (p.trim()) chunks.push(p.trim()); });
                    } else {
                        chunks.push(line);
                    }
                });
                return chunks.length ? chunks : [text];
            }

            function speakQueue(chunks, voice) {
                speaking = true; currentQueue = chunks.slice();
                const next = () => {
                    if (!speaking || currentQueue.length === 0) { speaking = false; return; }
                    const utt = new SpeechSynthesisUtterance(currentQueue.shift());
                    if (voice) { utt.voice = voice; utt.lang = voice.lang; }
                    utt.rate = parseFloat(rateInput.value || '1');
                    utt.pitch = parseFloat(pitchInput.value || '1');
                    utt.volume = parseFloat(volumeInput.value || '1');
                    utt.onend = next; utt.onerror = () => { next(); };
                    window.speechSynthesis.speak(utt);
                };
                next();
            }

            startBtn.addEventListener('click', () => {
                const text = document.getElementById('textarea').value.trim();
                if (!text) return showError('❌ 请输入要朗读的文本');
                const v = window.speechSynthesis.getVoices().find(v => v.name === voiceSelect.value);
                if (!v) return showError('❌ 请选择一个有效语音');
                
                switchTab('text');

                if (speaking) { window.speechSynthesis.cancel(); speaking = false; }
                speakQueue(splitTextToChunks(text), v);
                localStorage.setItem('tts_voice_name', v.name);
            });

            stopBtn.addEventListener('click', () => { speaking = false; window.speechSynthesis.cancel(); });
            filterChineseBox.addEventListener('change', listVoices);
            voiceSelect.addEventListener('change', () => { localStorage.setItem('tts_voice_name', voiceSelect.value); });
            
            rateInput.addEventListener('input', () => document.getElementById('tts-rate-val').textContent = rateInput.value + 'x');
            pitchInput.addEventListener('input', () => document.getElementById('tts-pitch-val').textContent = pitchInput.value);
            volumeInput.addEventListener('input', () => document.getElementById('tts-volume-val').textContent = volumeInput.value);

            listVoices();
            if (typeof window.speechSynthesis !== 'undefined' && typeof window.speechSynthesis.onvoiceschanged !== 'undefined') {
                window.speechSynthesis.onvoiceschanged = listVoices;
            }
        })();
    </script>
