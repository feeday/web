<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nano Banana 生图模型 - DatXY</title>
    <meta name="description" content="DatXY AI 图像生成工具，基于 Nano Banana 模型。">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ================== 1. 核心变量 ================== */
        :root {
            --bg-body: #020617; 
            --bg-card: rgba(30, 41, 59, 0.6);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --text-tertiary: #64748b;
            --border-light: rgba(255, 255, 255, 0.08);
            --border-hover: rgba(255, 255, 255, 0.2);
            --radius-card: 20px;
            --theme-blue: #38bdf8;
            --theme-green: #34d399;
            --theme-red: #ef4444;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-body);
            background-image: 
                radial-gradient(circle at 50% -20%, #1e293b 0%, transparent 60%),
                radial-gradient(circle at 50% 10%, rgba(56, 189, 248, 0.05) 0%, transparent 50%);
            background-attachment: fixed;
            color: var(--text-primary);
            line-height: 1.6;
            height: 100vh; /* 锁定整屏高度 */
            overflow: hidden; /* 禁止滚动 */
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        a { text-decoration: none; color: inherit; transition: 0.2s; }

        /* ================== 2. 宽屏工作台布局 ================== */
        .workspace {
            width: 100%;
            max-width: 1600px;
            height: 100%;
            max-height: 900px;
            background: var(--bg-card);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-card);
            box-shadow: 0 30px 60px -15px rgba(0,0,0,0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            overflow: hidden;
            animation: fadeUp 0.6s ease backwards;
        }

        /* 左侧：控制面板 */
        .control-panel {
            flex: 0 0 400px;
            min-width: 350px;
            padding: 30px;
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border-light);
            background: rgba(15, 23, 42, 0.4);
            overflow-y: auto;
        }

        /* 右侧：预览面板 */
        .preview-panel {
            flex: 1;
            padding: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            background: radial-gradient(circle at center, rgba(30, 41, 59, 0.3) 0%, transparent 70%);
        }

        /* ================== 3. 表单与控件 ================== */
        .brand-title {
            font-size: 1.4rem; font-weight: 700; margin-bottom: 24px;
            background: linear-gradient(135deg, #fff, #38bdf8);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            display: flex; align-items: center; gap: 10px;
        }

        .form-group { margin-bottom: 20px; display: flex; flex-direction: column; }
        .form-group.flex-grow { flex-grow: 1; }
        
        label { display: block; margin-bottom: 8px; font-size: 0.85rem; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px;}
        
        .glass-input { 
            width: 100%; background: rgba(0, 0, 0, 0.2); border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 12px; color: var(--text-primary); padding: 12px 14px; font-family: inherit; 
            font-size: 0.95rem; transition: all 0.3s; 
        }
        .glass-input::placeholder { color: rgba(148, 163, 184, 0.3); }
        .glass-input:focus { background: rgba(0, 0, 0, 0.4); border-color: rgba(56, 189, 248, 0.5); box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.15); }
        
        textarea.glass-input { resize: none; flex-grow: 1; line-height: 1.6; }

        select.glass-input { 
            appearance: none; -webkit-appearance: none; 
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2394a3b8' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e"); 
            background-repeat: no-repeat; background-position: right 12px center; background-size: 16px; padding-right: 40px; cursor: pointer; 
        }
        select.glass-input option { background-color: #0f172a; color: #fff; }
        select.glass-input:disabled { background-color: rgba(255, 255, 255, 0.02); color: var(--text-tertiary); cursor: not-allowed; border-color: transparent; }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        /* 按钮组 */
        .action-buttons { display: flex; flex-direction: column; gap: 12px; margin-top: 10px; }
        .btn-row { display: flex; gap: 12px; }
        
        .btn { padding: 12px 16px; border-radius: 10px; font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: all 0.2s; display: inline-flex; align-items: center; justify-content: center; gap: 8px; border: none; }
        .btn-primary { width: 100%; background: var(--theme-blue); color: #0f172a; box-shadow: 0 4px 15px rgba(56, 189, 248, 0.2); padding: 16px; font-size: 1.05rem; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(56, 189, 248, 0.4); background: #7dd3fc; }
        .btn-primary:disabled { background: rgba(255,255,255,0.1); color: var(--text-tertiary); box-shadow: none; cursor: not-allowed; transform: none; }
        
        .btn-secondary { flex: 1; background: rgba(255,255,255,0.03); color: var(--text-secondary); border: 1px solid rgba(255,255,255,0.1); }
        .btn-secondary:hover { background: rgba(255,255,255,0.08); color: #fff; border-color: rgba(255,255,255,0.2); }

        /* ================== 4. 预览区样式 ================== */
        .preview-placeholder { display: flex; flex-direction: column; align-items: center; color: var(--text-tertiary); gap: 15px; }
        .preview-placeholder svg { width: 64px; height: 64px; opacity: 0.2; }
        
        .result-image-wrapper { 
            width: 100%; height: 100%; display: none; flex-direction: column; align-items: center; justify-content: center;
        }
        .result-image { 
            max-width: 100%; max-height: calc(100% - 60px); object-fit: contain; 
            border-radius: 12px; box-shadow: 0 20px 40px rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.1); 
        }
        
        .btn-download { margin-top: 20px; background: rgba(52, 211, 153, 0.1); color: var(--theme-green); border: 1px solid rgba(52, 211, 153, 0.3); padding: 10px 24px;}
        .btn-download:hover { background: var(--theme-green); color: #020617; }

        .loader { display: none; width: 50px; height: 50px; border: 3px solid rgba(56, 189, 248, 0.1); border-top-color: var(--theme-blue); border-radius: 50%; animation: spin 1s linear infinite; position: absolute; }
        .error-msg { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.3); color: #fca5a5; padding: 12px 24px; border-radius: 8px; font-weight: 500; font-size: 0.9rem; display: none; }
        
        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* ================== 5. 响应式 ================== */
        @media (max-width: 900px) {
            body { padding: 0; }
            .workspace { flex-direction: column; border-radius: 0; border: none; height: 100vh; max-height: none; }
            .control-panel { flex: none; height: 55vh; border-right: none; border-bottom: 1px solid var(--border-light); }
            .preview-panel { height: 45vh; padding: 15px; }
            .result-image { max-height: calc(100% - 50px); }
        }
    </style>
</head>
<body>

    <div class="workspace">
        
        <div class="control-panel">
            <div class="brand-title">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--theme-blue)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                DatXY Vision
            </div>

            <div class="form-group">
                <label for="apiKey">API Key (Poixe)</label>
                <input type="password" id="apiKey" class="glass-input" placeholder="输入密钥，例: poixe-xxx">
            </div>
    
            <div class="form-group">
                <label for="modelSelect">模型版本 (Model)</label>
                <select id="modelSelect" class="glass-input">
                    <option value="gemini-2.5-flash-image">Nano Banana (标准闪电版)</option>
                    <option value="nano-banana-pro" selected>Nano Banana Pro (专业高画质版)</option>
                </select>
            </div>
    
            <div class="grid-2">
                <div class="form-group">
                    <label for="aspectRatio">画面比例</label>
                    <select id="aspectRatio" class="glass-input">
                        <option value="16:9">16:9 (横屏/壁纸)</option>
                        <option value="1:1">1:1 (正方形)</option>
                        <option value="9:16">9:16 (竖屏/手机)</option>
                        <option value="3:4">3:4</option>
                        <option value="4:3">4:3</option>
                        <option value="21:9">21:9 (带鱼屏)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="imageSize" id="imageSizeLabel">分辨率</label>
                    <select id="imageSize" class="glass-input">
                        <option value="2K">2K (2048x2048)</option>
                        <option value="1K" selected>1K (1024x1024)</option>
                        <option value="4K">4K (4096x4096)</option>
                    </select>
                </div>
            </div>

            <div class="form-group flex-grow">
                <label for="prompt">提示词 (Prompt)</label>
                <textarea id="prompt" class="glass-input" placeholder="描述你想要生成的画面。例如：一只橘猫坐在窗台上看雨，赛博朋克风格，霓虹灯光，高画质，电影感"></textarea>
            </div>
    
            <div class="action-buttons">
                <button id="generateBtn" class="btn btn-primary" onclick="generateImage()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                    开始生成
                </button>
                <div class="btn-row">
                    <button class="btn btn-secondary" onclick="window.location.href='/'">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                        返回首页
                    </button>
                    <a href="https://poixe.com/i/realfake" target="_blank" class="btn btn-secondary">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg>
                        获取 API
                    </a>
                </div>
            </div>
        </div>

        <div class="preview-panel">
            
            <div class="preview-placeholder" id="previewPlaceholder">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                <p>画面将在这里呈现</p>
            </div>

            <div class="loader" id="loader"></div>
            
            <div class="result-image-wrapper" id="resultWrapper">
                <img id="resultImage" class="result-image" alt="生成的图片">
                <button id="downloadBtn" class="btn btn-download" onclick="downloadImage()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                    保存高清原图
                </button>
            </div>

            <div class="error-msg" id="errorMsg"></div>
        </div>

    </div>

    <script>
        window.addEventListener('load', () => { 
            const savedKey = localStorage.getItem('poixe_api_key');
            if(savedKey) document.getElementById('apiKey').value = savedKey;

            updateResolutionState();
            document.getElementById('modelSelect').addEventListener('change', updateResolutionState);
        });

        function updateResolutionState() {
            const modelSelect = document.getElementById('modelSelect');
            const imageSizeSelect = document.getElementById('imageSize');
            const imageSizeLabel = document.getElementById('imageSizeLabel');

            if (modelSelect.value === 'nano-banana-pro') {
                imageSizeSelect.disabled = false; 
                imageSizeLabel.innerHTML = '分辨率 <span style="color: var(--theme-blue); font-size: 0.75rem; margin-left: 4px;">Pro</span>';
                imageSizeLabel.style.color = 'var(--text-secondary)';
            } else {
                imageSizeSelect.disabled = true; 
                imageSizeSelect.value = "1K"; 
                imageSizeLabel.innerHTML = '分辨率 <span style="color: var(--text-tertiary); font-size: 0.75rem; margin-left: 4px;">锁定 1K</span>';
            }
        }

        function showError(msg) {
            const errorMsg = document.getElementById('errorMsg');
            errorMsg.innerText = msg;
            errorMsg.style.display = "block";
            setTimeout(() => { errorMsg.style.display = "none"; }, 4000);
        }

        async function generateImage() {
            const rawKey = document.getElementById('apiKey').value;
            const apiKey = rawKey.replace(/[^\x20-\x7E]/g, '').trim();
            const model = document.getElementById('modelSelect').value;
            const prompt = document.getElementById('prompt').value.trim();
            const aspectRatio = document.getElementById('aspectRatio').value.split(' ')[0]; 
            const imageSize = document.getElementById('imageSize').value.split(' ')[0]; 
            
            const generateBtn = document.getElementById('generateBtn');
            const loader = document.getElementById('loader');
            const resultWrapper = document.getElementById('resultWrapper');
            const resultImage = document.getElementById('resultImage');
            const placeholder = document.getElementById('previewPlaceholder');

            if (!apiKey) return showError("❌ 请输入您的 API Key");
            if (!prompt) return showError("❌ 提示词不能为空");

            localStorage.setItem('poixe_api_key', apiKey);

            // UI 切换到加载状态
            placeholder.style.display = "none";
            resultWrapper.style.display = "none";
            loader.style.display = "block";
            
            generateBtn.disabled = true;
            generateBtn.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg> AI 正在绘制...';

            const requestBody = {
                contents: [ { parts: [ { text: prompt } ] } ],
                generationConfig: {
                    responseModalities: ["Text", "Image"],
                    imageConfig: {
                        aspectRatio: aspectRatio,
                        ...(model === 'nano-banana-pro' && { imageSize: imageSize })
                    }
                }
            };

            try {
                const response = await fetch(`https://api.poixe.com/v1beta/models/${model}:generateContent`, {
                    method: 'POST',
                    headers: { 'x-goog-api-key': apiKey, 'Content-Type': 'application/json' },
                    body: JSON.stringify(requestBody)
                });

                if (!response.ok) {
                    const errData = await response.json().catch(() => ({}));
                    throw new Error(errData.error?.message || `HTTP ${response.status}`);
                }

                const data = await response.json();
                
                if (data.candidates && data.candidates.length > 0) {
                    const parts = data.candidates[0].content.parts;
                    let imageUrl = "";

                    parts.forEach(part => {
                        if (part.inlineData) {
                            const mimeType = part.inlineData.mimeType || "image/png";
                            imageUrl = `data:${mimeType};base64,${part.inlineData.data}`;
                        }
                    });

                    if (imageUrl) {
                        resultImage.src = imageUrl;
                        resultWrapper.style.display = "flex";
                    } else {
                        showError("⚠️ 接口响应成功，但未返回图片数据");
                        placeholder.style.display = "flex";
                    }
                } else {
                    showError("❌ 未获取到生成结果");
                    placeholder.style.display = "flex";
                }

            } catch (error) {
                console.error("生成失败:", error);
                showError("❌ 生成失败: " + error.message);
                placeholder.style.display = "flex";
            } finally {
                loader.style.display = "none";
                generateBtn.disabled = false;
                generateBtn.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg> 重新生成';
            }
        }

        function downloadImage() {
            const img = document.getElementById('resultImage');
            if (!img.src) return;
            const link = document.createElement('a');
            link.href = img.src;
            link.download = `DatXY_Vision_${new Date().getTime()}.png`; 
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    </script>
</body>
</html>
