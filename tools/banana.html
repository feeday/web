<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nano Banana 生图模型 - DatXY</title>
    <meta name="description" content="DatXY AI 图像生成工具，基于 Nano Banana 模型。">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ================== 1. 核心变量 (DatXY 原生) ================== */
        :root {
            --bg-body: #020617; 
            --bg-card: rgba(30, 41, 59, 0.4);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --text-tertiary: #64748b;
            --border-light: rgba(255, 255, 255, 0.08);
            --border-hover: rgba(255, 255, 255, 0.2);
            --radius-card: 16px;
            --radius-pill: 999px;
            /* 生成器补充颜色 */
            --theme-blue: #38bdf8;
            --theme-green: #34d399;
            --theme-red: #ef4444;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-body);
            background-image: 
                radial-gradient(circle at 50% -20%, #1e293b 0%, transparent 60%),
                radial-gradient(circle at 50% 10%, rgba(56, 189, 248, 0.05) 0%, transparent 50%);
            background-attachment: fixed;
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
        }
        a { text-decoration: none; color: inherit; transition: 0.2s; }

        /* ================== 2. 悬浮胶囊导航 (DatXY 原生) ================== */
        .sticky-header-wrapper {
            position: sticky; top: 0; z-index: 999; width: 100%; display: flex; justify-content: center;
            padding: 20px; margin-bottom: 10px; background: rgba(2, 6, 23, 0.95); 
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); pointer-events: none; 
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .sticky-inner {
            background: rgba(30, 41, 59, 0.6); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: var(--radius-pill);
            box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.5); padding: 8px 12px; display: flex; 
            align-items: center; gap: 12px; width: auto; max-width: 100%; pointer-events: auto; 
        }
        .search-wrapper { 
            position: relative; width: 380px; height: 44px; border-radius: var(--radius-pill);
            background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex; align-items: center; padding: 0 6px; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1001; box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }
        .search-wrapper:focus-within { 
            width: 420px; background: rgba(15, 23, 42, 0.8); border-color: rgba(56, 189, 248, 0.5);
            box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.15);
        }
        .custom-select { position: relative; height: 100%; display: flex; align-items: center; cursor: pointer; padding-left: 8px; user-select: none; }
        .select-trigger { display: flex; align-items: center; gap: 6px; height: 100%; color: #e2e8f0; font-size: 0.9rem; font-weight: 500; white-space: nowrap; transition: opacity 0.2s; }
        .select-trigger:hover { opacity: 0.8; }
        .arrow-icon { width: 12px; height: 12px; fill: currentColor; opacity: 0.5; transition: transform 0.3s ease; }
        .custom-select.active .arrow-icon { transform: rotate(180deg); }
        .search-inner-divider { width: 1px; height: 18px; background: rgba(255,255,255,0.1); margin: 0 10px; flex-shrink: 0; }
        .search-input { flex: 1; border: none; background: transparent; color: #fff; font-size: 0.95rem; padding: 0; height: 100%; min-width: 0; }
        .search-input::placeholder { color: rgba(148, 163, 184, 0.5); }
        .search-clear { width: 20px; height: 20px; line-height: 20px; text-align: center; border-radius: 50%; background: rgba(255,255,255,0.1); color: #fff; font-size: 10px; cursor: pointer; display: none; margin-right: 8px; flex-shrink: 0; }
        .search-clear:hover { background: rgba(255,255,255,0.25); }
        .external-search-btn { width: 34px; height: 34px; display: flex; align-items: center; justify-content: center; border-radius: 50%; background: rgba(255,255,255,0.05); color: var(--text-secondary); cursor: pointer; transition: all 0.2s cubic-bezier(0.25, 0.8, 0.25, 1); flex-shrink: 0; margin-left: 0; }
        .external-search-btn svg { width: 16px; height: 16px; stroke-width: 2.5; }
        .external-search-btn:hover { background: #38bdf8; color: #0f172a; transform: scale(1.05); box-shadow: 0 0 10px rgba(56, 189, 248, 0.4); }
        .external-search-btn:active { transform: scale(0.95); }
        .select-options { position: absolute; top: 50px; left: 0; width: 140px; background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 16px; padding: 6px; display: flex; flex-direction: column; gap: 2px; box-shadow: 0 20px 50px -10px rgba(0, 0, 0, 0.5); opacity: 0; visibility: hidden; transform: translateY(-10px) scale(0.95); transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); z-index: 2000; }
        .custom-select.active .select-options { opacity: 1; visibility: visible; transform: translateY(0) scale(1); }
        .option-item { padding: 10px 12px; border-radius: 8px; font-size: 0.9rem; color: var(--text-secondary); transition: all 0.2s; cursor: pointer; }
        .option-item:hover { background: rgba(255, 255, 255, 0.1); color: #fff; }
        .option-item.selected { background: rgba(56, 189, 248, 0.15); color: #38bdf8; font-weight: 600; }
        .divider { width: 1px; height: 20px; background: rgba(255,255,255,0.1); margin: 0 4px; }
        .filter-bar { display: flex; gap: 4px; align-items: center; position: relative; background: rgba(0, 0, 0, 0.2); padding: 4px; border-radius: var(--radius-pill); border: 1px solid rgba(255,255,255,0.05); }
        .filter-glider { position: absolute; top: 4px; left: 0; height: calc(100% - 8px); background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.15); border-radius: var(--radius-pill); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2); transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1); z-index: 1; pointer-events: none; width: 0; }
        .tag-btn { background: transparent; border: none; color: var(--text-secondary); padding: 6px 16px; border-radius: var(--radius-pill); font-size: 0.9rem; font-weight: 500; cursor: pointer; transition: color 0.3s; white-space: nowrap; position: relative; z-index: 2; }
        .tag-btn.active { color: #fff; font-weight: 600; text-shadow: 0 0 10px rgba(255,255,255,0.3); background: transparent; box-shadow: none; }
        .tag-btn:hover:not(.active) { color: #fff; }

        /* ================== 3. 生成器专属区域 (替代原网格) ================== */
        .main-content { padding: 0 2rem; flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; }
        
        .generator-wrapper { width: 100%; max-width: 800px; margin: 20px auto; animation: fadeUp 0.6s ease backwards; }
        
        .page-title { text-align: center; font-size: 1.8rem; font-weight: 700; margin-bottom: 30px; background: linear-gradient(135deg, #fff, #38bdf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .generator-card { background: var(--bg-card); border: 1px solid var(--border-light); border-radius: var(--radius-card); padding: 30px; box-shadow: 0 20px 40px -10px rgba(0,0,0,0.5); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }

        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 0.9rem; font-weight: 500; color: var(--text-secondary); }
        
        /* 玻璃态输入框 */
        .glass-input { width: 100%; background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; color: var(--text-primary); padding: 12px 16px; font-family: inherit; font-size: 0.95rem; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .glass-input::placeholder { color: rgba(148, 163, 184, 0.4); }
        .glass-input:focus { background: rgba(15, 23, 42, 0.9); border-color: rgba(56, 189, 248, 0.5); box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.15); }
        textarea.glass-input { resize: vertical; min-height: 120px; line-height: 1.5; }

        select.glass-input { appearance: none; -webkit-appearance: none; background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2394a3b8' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e"); background-repeat: no-repeat; background-position: right 12px center; background-size: 16px; padding-right: 40px; cursor: pointer; }
        select.glass-input option { background-color: #0f172a; color: #fff; }
        select.glass-input:disabled { background-color: rgba(255, 255, 255, 0.02); color: var(--text-tertiary); cursor: not-allowed; border-color: transparent; }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

        /* 按钮组 */
        .button-group { display: flex; gap: 15px; margin-top: 30px; }
        .btn { padding: 14px 24px; border-radius: 12px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.3s ease; text-align: center; display: inline-flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-primary { flex: 2; background: var(--theme-blue); color: #0f172a; border: none; box-shadow: 0 4px 15px rgba(56, 189, 248, 0.3); }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(56, 189, 248, 0.4); background: #7dd3fc; }
        .btn-primary:disabled { background: rgba(255,255,255,0.1); color: var(--text-tertiary); box-shadow: none; cursor: not-allowed; transform: none; }
        .btn-secondary { flex: 1; background: rgba(255,255,255,0.03); color: var(--text-primary); border: 1px solid rgba(255,255,255,0.1); text-decoration: none; }
        .btn-secondary:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.2); }

        /* 结果展示区 */
        .result-area { margin-top: 30px; padding-top: 30px; border-top: 1px solid var(--border-light); display: flex; flex-direction: column; align-items: center; }
        .result-image { max-width: 100%; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: none; border: 1px solid var(--border-light); }
        .btn-download { width: 100%; margin-top: 20px; background: rgba(52, 211, 153, 0.1); color: var(--theme-green); border: 1px solid rgba(52, 211, 153, 0.3); display: none; }
        .btn-download:hover { background: var(--theme-green); color: #020617; }
        .result-text { width: 100%; margin-top: 20px; padding: 16px; background: rgba(0,0,0,0.2); border-radius: 12px; border: 1px solid var(--border-light); color: var(--text-secondary); font-size: 0.9rem; display: none; line-height: 1.6; }
        .error-msg { color: var(--theme-red); margin-top: 15px; font-weight: 500; font-size: 0.9rem; }
        
        .loader { display: none; width: 40px; height: 40px; border: 3px solid rgba(56, 189, 248, 0.2); border-top-color: var(--theme-blue); border-radius: 50%; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        /* ================== 4. Footer & 响应式 (DatXY 原生) ================== */
        .site-footer { margin-top: 6rem; padding: 4rem 1rem; border-top: 1px solid rgba(255, 255, 255, 0.05); background: linear-gradient(to bottom, rgba(2, 6, 23, 0) 0%, rgba(2, 6, 23, 1) 100%); }
        .footer-content { max-width: 1200px; margin: 0 auto; display: flex; flex-direction: column; align-items: center; gap: 1.5rem; text-align: center; }
        .copyright { color: var(--text-tertiary); font-size: 0.85rem; }
        .footer-links { display: flex; align-items: center; gap: 24px; flex-wrap: wrap; justify-content: center; }
        .footer-link-item { display: flex; align-items: center; gap: 8px; font-size: 0.9rem; color: var(--text-secondary); padding: 6px 12px; border-radius: 8px; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); transition: all 0.2s ease; }
        .footer-link-item:hover { color: #fff; background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.1); transform: translateY(-2px); }
        .footer-icon { width: 16px; height: 16px; fill: currentColor; }
        .fab-top { position: fixed; bottom: 30px; right: 30px; width: 44px; height: 44px; border-radius: 12px; background: rgba(30, 41, 59, 0.9); backdrop-filter: blur(10px); border: 1px solid var(--border-light); color: var(--text-secondary); display: flex; align-items: center; justify-content: center; cursor: pointer; opacity: 0; transform: translateY(10px); transition: 0.3s; z-index: 1000; }
        .fab-top:hover { border-color: var(--text-secondary); color: #fff; }
        .fab-top.visible { opacity: 1; transform: translateY(0); }

        @media (max-width: 768px) {
            .sticky-header-wrapper { padding: 10px; padding-top: 10px; padding-bottom: 20px; margin-bottom: 20px; }
            .sticky-inner { flex-direction: column; width: 100%; border-radius: 20px; padding: 12px 14px; gap: 10px; }
            .search-wrapper, .search-wrapper:focus-within { width: 100%; }
            .search-input { font-size: 16px; }
            .divider { display: none; } 
            .filter-bar { width: 100%; overflow-x: auto; justify-content: flex-start; scrollbar-width: none; }
            .filter-bar::-webkit-scrollbar { display: none; }
            .tag-btn { padding: 6px 14px; font-size: 0.85rem; }
            .main-content { padding: 0 1rem; }
            .fab-top { width: 40px; height: 40px; bottom: 20px; right: 20px; }
            
            /* 生成器移动端适配 */
            .generator-card { padding: 20px; }
            .grid-2 { grid-template-columns: 1fr; gap: 15px; }
            .button-group { flex-direction: column; gap: 15px; }
            .btn-primary, .btn-secondary { width: 100%; }
            .page-title { font-size: 1.4rem; }
        }
    </style>
</head>
<body>

    <div class="sticky-header-wrapper">
        <div class="sticky-inner">            
            <div class="search-wrapper">                
                <div class="custom-select" id="customSelect">
                    <div class="select-trigger" onclick="toggleSelect(event)">
                        <span id="currentEngineText">Google</span>
                        <svg class="arrow-icon" viewBox="0 0 24 24"><path d="M7 10l5 5 5-5z"/></svg>
                    </div>                    
                    <input type="hidden" id="searchEngineValue" value="https://www.google.com/search?q=">
                    <div class="select-options" id="selectOptions">
                        <div class="option-item selected" onclick="selectEngine('https://www.google.com/search?q=', 'Google', this)">Google</div>
                        <div class="option-item" onclick="selectEngine('https://www.youtube.com/results?search_query=', 'YouTube', this)">YouTube</div>
                        <div class="option-item" onclick="selectEngine('https://yandex.by/images/search?text=', 'Yandex', this)">Yandex</div>
                        <div class="option-item" onclick="selectEngine('https://search.bilibili.com/all?keyword=', 'B站', this)">Bilibili</div>
                        <div class="option-item" onclick="selectEngine('https://www.douyin.com/search/', '抖音', this)">Douyin</div>
                        <div class="option-item" onclick="selectEngine('https://www.baidu.com/s?q2=', '百度', this)">Baidu</div>
                    </div>
                </div>                
                <div class="search-inner-divider"></div>
                <input type="text" class="search-input" id="searchInput" placeholder="搜索链接或关键字..." autocomplete="off">                
                <span class="search-clear" id="searchClear" onmousedown="event.preventDefault()" onclick="clearSearch()">✕</span>                
                <div class="external-search-btn" id="externalSearchBtn" title="搜索">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                </div>
            </div>            
            <div class="divider"></div>            
            <div class="filter-bar">
                <div class="filter-glider" id="filterGlider"></div>
                <button class="tag-btn" onclick="window.location.href='/'">← 返回导航主站</button>
                <button class="tag-btn active" onclick="filterData('tool', this)">✨ 图像生成器</button>
            </div>
        </div>
    </div>

    <div class="main-content">
        <div class="generator-wrapper">
            <div class="page-title">Nano Banana 大模型控制台</div>
            
            <div class="generator-card">
                <div class="form-group">
                    <label for="apiKey">API Key (x-goog-api-key)</label>
                    <input type="password" id="apiKey" class="glass-input" placeholder="输入您的 Poixe API Key，例如：poixe-xxxxxx">
                </div>
        
                <div class="form-group">
                    <label for="modelSelect">模型版本 (Model Version)</label>
                    <select id="modelSelect" class="glass-input">
                        <option value="gemini-2.5-flash-image">gemini-2.5-flash-image (Nano Banana - 标准版)</option>
                        <option value="nano-banana-pro" selected>nano-banana-pro (Nano Banana Pro - 专业版)</option>
                    </select>
                </div>
        
                <div class="form-group">
                    <label for="prompt">提示词 (Prompt)</label>
                    <textarea id="prompt" class="glass-input" placeholder="描述你想要生成的画面。例如：一只橘猫坐在窗台上看雨，赛博朋克风格，霓虹灯光，高画质，电影感"></textarea>
                </div>
        
                <div class="grid-2">
                    <div class="form-group">
                        <label for="aspectRatio">画面比例 (Aspect Ratio)</label>
                        <select id="aspectRatio" class="glass-input">
                            <option value="16:9">16:9 (横屏/壁纸)</option>
                            <option value="1:1">1:1 (正方形/头像)</option>
                            <option value="9:16">9:16 (竖屏/手机壁纸)</option>
                            <option value="3:4">3:4</option>
                            <option value="4:3">4:3</option>
                            <option value="2:3">2:3</option>
                            <option value="3:2">3:2</option>
                            <option value="21:9">21:9 (带鱼屏)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="imageSize" id="imageSizeLabel">分辨率 (Image Size)</label>
                        <select id="imageSize" class="glass-input">
                            <option value="2K">2K (2048x2048)</option>
                            <option value="1K" selected>1K (1024x1024)</option>
                            <option value="4K">4K (4096x4096)</option>
                        </select>
                    </div>
                </div>
        
                <div class="button-group">
                    <button id="generateBtn" class="btn btn-primary" onclick="generateImage()">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                        开始生成
                    </button>
                    <a href="https://poixe.com/i/realfake" target="_blank" class="btn btn-secondary">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg>
                        获取 API
                    </a>
                </div>
        
                <div class="result-area" id="resultArea" style="display: none;">
                    <div class="loader" id="loader"></div>
                    <div class="error-msg" id="errorMsg"></div>
                    
                    <img id="resultImage" class="result-image" alt="生成的图片">
                    <button id="downloadBtn" class="btn btn-download" onclick="downloadImage()">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                        保存图片到本地
                    </button>
                    <div id="resultText" class="result-text"></div>
                </div>
            </div>
        </div>
    </div>

    <footer class="site-footer">
        <div class="footer-content">
            <div class="copyright">
                <p>&copy; 2025 DatXY &nbsp;·&nbsp; Web Gemini 3 Pro Design</p>
            </div>
            <div class="footer-links">
                <a href="https://github.com/" target="_blank" class="footer-link-item">
                    <svg class="footer-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg> GitHub
                </a>
                <a href="https://dash.cloudflare.com/" target="_blank" class="footer-link-item">
                    <svg class="footer-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M9.998 8.014L5.358 13.91h3.918l-1.057 5.766 8.649-11.338H11.23l1.823-5.326L9.998 8.014zm-4.39 1.764L1.76 14.54a3.868 3.868 0 0 0 3.863 3.87h1.01c.21 1.58 1.56 2.8 3.19 2.8h7.957a4.67 4.67 0 0 0 1.516-9.088c-.015-.173-.023-.35-.023-.527a6.62 6.62 0 0 0-6.619-6.619c-2.923 0-5.412 1.89-6.289 4.526a3.882 3.882 0 0 0-.765-.077z"/></svg> Cloudflare
                </a>
                <a href="https://huggingface.co/" target="_blank" class="footer-link-item">
                    <svg class="footer-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 .5C5.37.5 0 5.87 0 12.5c0 3.2 1.25 6.13 3.32 8.35l.04.05c.82.88 2.06 1.2 2.97.77.92-.42 1.2-1.65.8-2.57l-.05-.12c-.52-.86-.82-1.85-.82-2.91 0-3.17 2.58-5.75 5.75-5.75 3.17 0 5.75 2.58 5.75 5.75 0 1.05-.29 2.03-.8 2.89l-.04.1c-.42.94-.15 2.18.78 2.6.93.43 2.18.1 3.01-.79l.05-.05C22.75 18.63 24 15.7 24 12.5 24 5.87 18.63.5 12 .5zM7.75 11.25a1.75 1.75 0 1 1 0-3.5 1.75 1.75 0 0 1 0 3.5zM12 17.6c-2.04 0-3.8-1.24-4.52-3.01h9.04c-.72 1.77-2.48 3.01-4.52 3.01zM16.25 11.25a1.75 1.75 0 1 1 0-3.5 1.75 1.75 0 0 1 0 3.5z"/>
                    </svg> HuggingFace
                </a>
            </div>
        </div>
    </footer>
    <div class="fab-top" id="fabTop" onclick="scrollToTop()">↑</div>

    <script>
        // --- DatXY 导航栏原有逻辑 ---
        const glider = document.getElementById('filterGlider');
        function moveGlider(targetBtn) {
            if(!targetBtn || !glider) return;
            glider.style.width = targetBtn.offsetWidth + 'px';
            glider.style.transform = `translateX(${targetBtn.offsetLeft}px)`;
        }
        function filterData(type, btnElement) {
            if(btnElement) {
                document.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('active'));
                btnElement.classList.add('active');
                moveGlider(btnElement);
            }
        }
        
        function toggleSelect(e) {
            e.stopPropagation(); 
            document.getElementById('customSelect').classList.toggle('active');
        }
        function selectEngine(value, name, element) {
            document.getElementById('searchEngineValue').value = value;
            document.getElementById('currentEngineText').innerText = name;
            document.querySelectorAll('.option-item').forEach(item => item.classList.remove('selected'));
            element.classList.add('selected');
            document.getElementById('customSelect').classList.remove('active');
            
            const input = document.getElementById('searchInput');
            input.placeholder = `回车搜索 ${name}...`;
            input.focus();
        }
        function performSearch() {
            const engine = document.getElementById('searchEngineValue').value; 
            const query = document.getElementById('searchInput').value;
            if (!query.trim()) {
                const wrapper = document.querySelector('.search-wrapper');
                wrapper.style.animation = 'shake 0.4s ease-in-out';
                setTimeout(() => wrapper.style.animation = '', 400);
                return;
            }
            window.open(engine + encodeURIComponent(query), "_blank");
        }
        document.addEventListener('click', (e) => {
            const wrapper = document.getElementById('customSelect');
            if (wrapper && !wrapper.contains(e.target)) wrapper.classList.remove('active');
        });
        document.getElementById('externalSearchBtn').addEventListener('click', performSearch);
        document.getElementById('searchInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') { e.preventDefault(); performSearch(); }
        });

        const searchInput = document.getElementById('searchInput');
        const searchClear = document.getElementById('searchClear');
        searchInput.addEventListener('input', (e) => {
            searchClear.style.display = e.target.value.length > 0 ? 'block' : 'none';
        });
        function clearSearch() { searchInput.value = ''; searchClear.style.display = 'none'; searchInput.focus(); }

        const fab = document.getElementById('fabTop');
        window.addEventListener('scroll', () => {
            if (window.scrollY > 300) fab.classList.add('visible');
            else fab.classList.remove('visible');
        });
        function scrollToTop() { window.scrollTo({ top: 0, behavior: 'smooth' }); }

        // --- 生成器专属逻辑 ---
        window.addEventListener('load', () => { 
            const activeBtn = document.querySelector('.tag-btn.active'); 
            if(activeBtn) moveGlider(activeBtn); 

            // 恢复 API Key
            const savedKey = localStorage.getItem('poixe_api_key');
            if(savedKey) document.getElementById('apiKey').value = savedKey;

            updateResolutionState();
            document.getElementById('modelSelect').addEventListener('change', updateResolutionState);
        });
        window.addEventListener('resize', () => { 
            const activeBtn = document.querySelector('.tag-btn.active'); 
            if(activeBtn) moveGlider(activeBtn); 
        });

        function updateResolutionState() {
            const modelSelect = document.getElementById('modelSelect');
            const imageSizeSelect = document.getElementById('imageSize');
            const imageSizeLabel = document.getElementById('imageSizeLabel');
            const selectedModel = modelSelect.value;

            if (selectedModel === 'nano-banana-pro') {
                imageSizeSelect.disabled = false; 
                imageSizeLabel.innerHTML = '分辨率 <span style="color: var(--theme-blue); font-size: 0.8rem; margin-left: 6px;">Pro 可用</span>';
                imageSizeLabel.style.color = 'var(--text-primary)';
            } else {
                imageSizeSelect.disabled = true; 
                imageSizeSelect.value = "1K"; 
                imageSizeLabel.innerHTML = '分辨率 <span style="color: var(--text-tertiary); font-size: 0.8rem; margin-left: 6px;">标准版锁定 1K</span>';
                imageSizeLabel.style.color = 'var(--text-tertiary)'; 
            }
        }

        async function generateImage() {
            const rawKey = document.getElementById('apiKey').value;
            const apiKey = rawKey.replace(/[^\x20-\x7E]/g, '').trim();
            const model = document.getElementById('modelSelect').value;
            const prompt = document.getElementById('prompt').value.trim();
            const aspectRatio = document.getElementById('aspectRatio').value.split(' ')[0]; 
            const imageSize = document.getElementById('imageSize').value.split(' ')[0]; 
            
            const generateBtn = document.getElementById('generateBtn');
            const downloadBtn = document.getElementById('downloadBtn');
            const loader = document.getElementById('loader');
            const errorMsg = document.getElementById('errorMsg');
            const resultImage = document.getElementById('resultImage');
            const resultText = document.getElementById('resultText');
            const resultArea = document.getElementById('resultArea');

            if (!apiKey) {
                resultArea.style.display = "flex";
                errorMsg.innerText = "❌ 请输入有效的 API Key";
                return;
            }
            if (!prompt) {
                resultArea.style.display = "flex";
                errorMsg.innerText = "❌ 请输入提示词";
                return;
            }

            localStorage.setItem('poixe_api_key', apiKey);

            resultArea.style.display = "flex";
            errorMsg.innerText = "";
            resultImage.style.display = "none";
            resultText.style.display = "none";
            downloadBtn.style.display = "none";
            loader.style.display = "block";
            
            generateBtn.disabled = true;
            generateBtn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg> 正在生成中...';

            const requestBody = {
                contents: [ { parts: [ { text: prompt } ] } ],
                generationConfig: {
                    responseModalities: ["Text", "Image"],
                    imageConfig: {
                        aspectRatio: aspectRatio,
                        ...(model === 'nano-banana-pro' && { imageSize: imageSize })
                    }
                }
            };

            try {
                const response = await fetch(`https://api.poixe.com/v1beta/models/${model}:generateContent`, {
                    method: 'POST',
                    headers: { 'x-goog-api-key': apiKey, 'Content-Type': 'application/json' },
                    body: JSON.stringify(requestBody)
                });

                if (!response.ok) {
                    const errData = await response.json().catch(() => ({}));
                    throw new Error(errData.error?.message || `HTTP 错误状态码: ${response.status}`);
                }

                const data = await response.json();
                
                if (data.candidates && data.candidates.length > 0) {
                    const parts = data.candidates[0].content.parts;
                    let imageUrl = "";
                    let textContent = "";

                    parts.forEach(part => {
                        if (part.text) textContent += part.text + "<br/>";
                        if (part.inlineData) {
                            const mimeType = part.inlineData.mimeType || "image/png";
                            const base64Data = part.inlineData.data;
                            imageUrl = `data:${mimeType};base64,${base64Data}`;
                        }
                    });

                    if (imageUrl) {
                        resultImage.src = imageUrl;
                        resultImage.style.display = "block";
                        downloadBtn.style.display = "inline-flex"; 
                    } else {
                        errorMsg.innerText = "⚠️ 接口响应成功，但未返回图片数据。";
                    }

                    if (textContent) {
                        resultText.innerHTML = "<strong>💡 模型回复：</strong><br/>" + textContent;
                        resultText.style.display = "block";
                    }
                } else {
                    errorMsg.innerText = "❌ 未获取到返回结果 (No candidates)";
                }

            } catch (error) {
                console.error("生成失败:", error);
                errorMsg.innerText = "❌ 请求失败: " + error.message;
            } finally {
                loader.style.display = "none";
                generateBtn.disabled = false;
                generateBtn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg> 重新生成';
            }
        }

        function downloadImage() {
            const img = document.getElementById('resultImage');
            if (!img.src) return;
            const link = document.createElement('a');
            link.href = img.src;
            link.download = `DatXY_Vision_${new Date().getTime()}.png`; 
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    </script>
</body>
</html>
