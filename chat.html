<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>顺序式模型群聊 - Poixe</title>
<style>
body{ font-family:"微软雅黑",Arial; background:#f0f0f0; margin:0; padding:0; }
header{ background:#1677ff; color:#fff; text-align:center; padding:15px 0; font-size:20px; }
#chat-container{ padding:10px; max-width:600px; margin:0 auto; height:70vh; overflow-y:auto; }
.message{ margin:10px 0; display:flex; }
.message.user{ justify-content:flex-end; }
.message.model{ justify-content:flex-start; }
.bubble{ max-width:70%; padding:10px 15px; border-radius:15px; line-height:1.5; }
.message.user .bubble{ background:#9ecfff; border-bottom-right-radius:0; color:#000; }
.message.model .bubble{ background:#fff; border-bottom-left-radius:0; color:#000; }
#input-area{ max-width:600px; margin:10px auto; display:flex; }
#input-area input{ flex:1; padding:10px; font-size:16px; border-radius:5px; border:1px solid #ccc; }
#input-area button{ padding:10px 20px; margin-left:5px; font-size:16px; border:none; background:#1677ff; color:#fff; border-radius:5px; cursor:pointer; }
.config{ max-width:600px; margin:10px auto; display:flex; flex-direction:column; }
.config input{ padding:8px; margin:5px 0; font-size:14px; border-radius:5px; border:1px solid #ccc; }
.config button{ padding:6px 12px; font-size:14px; margin-bottom:5px; cursor:pointer; background:#1677ff; color:#fff; border:none; border-radius:5px; }
</style>
</head>
<body>

<header>顺序式模型群聊 - Poixe</header>

<div class="config">
  <input type="text" id="apiKey" placeholder="输入你的 Poixe API 密钥">
  <button onclick="window.open('https://poixe.com/playground?i=token','_blank')">获取密钥</button>
  <input type="text" id="models" placeholder="输入模型名称，按顺序逗号分隔，例如: deepseek-v4-flash,gemini-3.5-flash">
</div>

<div id="chat-container"></div>

<div id="input-area">
  <input type="text" id="userInput" placeholder="请输入你的问题">
  <button onclick="sendMessage()">发送</button>
</div>

<script>
let chatHistory = [];
const apiUrl = "https://api.poixe.com/v1/chat/completions";

function appendMessage(sender, text, type){
  const container = document.getElementById('chat-container');
  const div = document.createElement('div');
  div.className = 'message ' + type;
  div.innerHTML = `<div class="bubble"><strong>${sender}:</strong><br>${text}</div>`;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

async function sendMessage(){
  const userText = document.getElementById('userInput').value.trim();
  if(!userText) return;
  const apiKey = document.getElementById('apiKey').value.trim();
  const modelsInput = document.getElementById('models').value.trim();
  if(!apiKey){ alert("请先输入 API 密钥！"); return; }
  if(!modelsInput){ alert("请先输入模型顺序！"); return; }

  const models = modelsInput.split(',').map(m=>m.trim());
  appendMessage('你', userText, 'user');
  chatHistory.push({role:'user', content:userText});
  document.getElementById('userInput').value = '';

  let previousAnswer = null;

  for(let i=0;i<models.length;i++){
    const model = models[i];
    let promptMessages = [];

    if(i===0){
      // 第一个模型只看到用户问题
      promptMessages = [...chatHistory];
      appendMessage(model,'正在生成...','model');
    } else {
      // 后续模型看到用户问题 + 上一个模型回答
      const checkPrompt = `请阅读以下用户问题和上一个模型回答，核对上一个模型回答是否正确，并补充说明。\n\n用户问题: ${userText}\n${models[i-1]}的回答: ${previousAnswer}`;
      promptMessages = [{role:'user', content:checkPrompt}];
      appendMessage(model,'正在核对...','model');
    }

    const answer = await callModel(apiUrl, apiKey, model, promptMessages);
    replaceLastModelMessage(answer, model);
    chatHistory.push({role:'assistant', name:model, content:answer});
    previousAnswer = answer;
  }
}

async function callModel(apiUrl, apiKey, model, messages){
  try{
    const response = await fetch(apiUrl,{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'Authorization':'Bearer '+apiKey
      },
      body:JSON.stringify({
        model:model,
        messages:messages,
        temperature:0.7
      })
    });
    const data = await response.json();
    return data.choices?.[0]?.message?.content || data.choices?.[0]?.text || '[出错]';
  }catch(err){
    console.error(err);
    return '[请求失败]';
  }
}

function replaceLastModelMessage(text, model){
  const container = document.getElementById('chat-container');
  const messages = container.getElementsByClassName('message model');
  messages[messages.length-1].querySelector('.bubble').innerHTML = `<strong>${model}:</strong><br>${text}`;
}
</script>

</body>
</html>
