<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MD 文档编辑器 - AI 排版与预览</title>
    <style>
        :root {
            --bg-body: #020617;
            --bg-card: rgba(15, 23, 42, 0.78);
            --bg-panel: rgba(30, 41, 59, 0.48);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --text-tertiary: #64748b;
            --theme-blue: #38bdf8;
            --theme-purple: #a78bfa;
            --theme-green: #34d399;
            --border-light: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background-color: var(--bg-body);
            background-image:
                radial-gradient(circle at 20% -10%, rgba(56, 189, 248, 0.18), transparent 35%),
                radial-gradient(circle at 85% 15%, rgba(167, 139, 250, 0.16), transparent 38%),
                linear-gradient(135deg, rgba(15, 23, 42, 0.75), rgba(2, 6, 23, 1));
            color: var(--text-primary);
            min-height: 100vh;
            padding: 18px;
            overflow: hidden;
        }

        .workspace {
            width: 100%;
            height: calc(100vh - 36px);
            display: grid;
            grid-template-columns: 330px minmax(0, 1fr);
            gap: 14px;
        }

        .panel, .editor-card, .preview-card {
            background: var(--bg-card);
            border: 1px solid var(--border-light);
            border-radius: 22px;
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.34);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            overflow: hidden;
        }

        .panel { display: flex; flex-direction: column; min-height: 0; }
        .panel-scroll { padding: 22px; overflow-y: auto; }
        .brand { display: flex; align-items: center; gap: 10px; font-weight: 800; font-size: 1.1rem; margin-bottom: 18px; }
        .brand-mark { width: 34px; height: 34px; border-radius: 12px; display: grid; place-items: center; background: linear-gradient(135deg, var(--theme-blue), var(--theme-purple)); color: #020617; }
        .hint { color: var(--text-secondary); font-size: 0.82rem; line-height: 1.6; margin-bottom: 16px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 8px; font-size: 0.78rem; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.04em; }
        .glass-input, textarea, select {
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            background: rgba(0, 0, 0, 0.28);
            color: var(--text-primary);
            padding: 11px 13px;
            font: inherit;
            transition: 0.2s ease;
        }
        .glass-input:focus, textarea:focus, select:focus { border-color: rgba(56, 189, 248, 0.55); box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.12); }
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn {
            height: 40px;
            border: 0;
            border-radius: 12px;
            padding: 0 14px;
            font-weight: 800;
            cursor: pointer;
            color: #020617;
            background: var(--theme-blue);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: 0.18s ease;
            text-decoration: none;
            white-space: nowrap;
        }
        .btn:hover { transform: translateY(-1px); filter: brightness(1.05); }
        .btn:disabled { opacity: 0.55; cursor: not-allowed; transform: none; }
        .btn.secondary { background: rgba(255, 255, 255, 0.09); color: var(--text-primary); border: 1px solid rgba(255, 255, 255, 0.1); }
        .btn.green { background: var(--theme-green); }
        .btn.purple { background: var(--theme-purple); }
        .btn.full { width: 100%; }
        .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .divider { height: 1px; background: var(--border-light); margin: 18px 0; }

        .main { min-width: 0; min-height: 0; display: grid; grid-template-rows: auto minmax(0, 1fr); gap: 14px; }
        .topbar {
            background: var(--bg-card);
            border: 1px solid var(--border-light);
            border-radius: 20px;
            padding: 12px;
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }
        .tool-btn { min-width: 38px; height: 36px; border-radius: 10px; border: 1px solid rgba(255, 255, 255, 0.1); background: rgba(255, 255, 255, 0.06); color: var(--text-primary); cursor: pointer; font-weight: 800; }
        .tool-btn:hover { background: rgba(56, 189, 248, 0.16); border-color: rgba(56, 189, 248, 0.34); }
        .split { min-height: 0; display: grid; grid-template-columns: minmax(0, 1fr) minmax(0, 1fr); gap: 14px; }
        .card-head { padding: 14px 16px; border-bottom: 1px solid var(--border-light); display: flex; align-items: center; justify-content: space-between; gap: 10px; }
        .card-title { font-weight: 800; }
        .status { color: var(--text-secondary); font-size: 0.8rem; }
        #markdownInput { height: calc(100% - 57px); min-height: 240px; border: 0; border-radius: 0; resize: none; background: rgba(2, 6, 23, 0.58); line-height: 1.7; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
        .preview { height: calc(100% - 57px); overflow: auto; padding: 24px; background: rgba(255, 255, 255, 0.025); line-height: 1.75; }
        .preview h1, .preview h2, .preview h3 { margin: 1.1em 0 0.55em; line-height: 1.25; }
        .preview h1 { font-size: 2rem; border-bottom: 1px solid var(--border-light); padding-bottom: 0.3em; }
        .preview h2 { font-size: 1.45rem; }
        .preview h3 { font-size: 1.18rem; }
        .preview p, .preview ul, .preview ol, .preview blockquote, .preview pre, .preview table { margin: 0.8em 0; }
        .preview ul, .preview ol { padding-left: 1.45em; }
        .preview blockquote { border-left: 4px solid var(--theme-blue); padding: 0.25em 1em; color: #cbd5e1; background: rgba(56, 189, 248, 0.08); border-radius: 0 12px 12px 0; }
        .preview code { background: rgba(148, 163, 184, 0.14); padding: 0.15em 0.35em; border-radius: 6px; color: #bae6fd; }
        .preview pre { background: rgba(0, 0, 0, 0.36); border: 1px solid var(--border-light); border-radius: 14px; padding: 14px; overflow-x: auto; }
        .preview pre code { background: transparent; padding: 0; }
        .preview table { width: 100%; border-collapse: collapse; overflow: hidden; border-radius: 12px; }
        .preview th, .preview td { border: 1px solid var(--border-light); padding: 8px 10px; }
        .preview th { background: rgba(56, 189, 248, 0.12); }
        .preview img, .preview video { max-width: 100%; border-radius: 14px; border: 1px solid var(--border-light); margin: 10px 0; }
        .preview a { color: #7dd3fc; }
        .media-preview { display: grid; gap: 10px; margin-top: 10px; }
        .media-preview img, .media-preview video { width: 100%; max-height: 170px; object-fit: contain; border: 1px solid var(--border-light); border-radius: 12px; background: rgba(0, 0, 0, 0.28); }
        .small { font-size: 0.78rem; color: var(--text-tertiary); line-height: 1.55; }

        @media (max-width: 980px) {
            body { padding: 0; overflow: auto; }
            .workspace { height: auto; min-height: 100vh; grid-template-columns: 1fr; padding: 12px; }
            .split { grid-template-columns: 1fr; }
            .panel, .editor-card, .preview-card { border-radius: 18px; }
            #markdownInput, .preview { height: 52vh; }
        }
    </style>
</head>
<body>
    <div class="workspace">
        <aside class="panel">
            <div class="panel-scroll">
                <div class="brand"><span class="brand-mark">MD</span><span>AI Markdown 编辑器</span></div>
                <p class="hint">左侧写 Markdown，右侧实时预览。可用默认 API 配置调用模型改写、润色、排版文档，并支持图片/视频本地预览与插入。</p>

                <div class="form-group">
                    <label for="apiKey">🔑 API Key</label>
                    <input id="apiKey" class="glass-input" type="password" placeholder="请输入你的 API Key">
                </div>
                <div class="form-group">
                    <label for="apiBaseUrl">🌐 API URL</label>
                    <input id="apiBaseUrl" class="glass-input" value="https://api.poixe.com/v1/" placeholder="https://api.poixe.com/v1/">
                </div>
                <div class="form-group">
                    <label for="modelName">🤖 默认模型</label>
                    <input id="modelName" class="glass-input" value="gemini-3.1-pro-preview" placeholder="gemini-3.1-pro-preview">
                </div>

                <div class="divider"></div>

                <div class="form-group">
                    <label for="aiInstruction">✨ 模型编辑指令</label>
                    <select id="aiInstruction" class="glass-input">
                        <option value="请将下面的 Markdown 文档润色为表达清晰、结构完整、排版规范的中文文档。保留 Markdown 格式，只输出修改后的 Markdown。">润色并规范排版</option>
                        <option value="请扩写下面的 Markdown 文档，补充必要说明、层级标题、列表和示例。保留 Markdown 格式，只输出修改后的 Markdown。">扩写内容</option>
                        <option value="请精简下面的 Markdown 文档，让内容更简洁但不丢失关键信息。保留 Markdown 格式，只输出修改后的 Markdown。">精简内容</option>
                        <option value="请检查下面 Markdown 文档的错别字、语病、标题层级、列表和表格格式，并直接输出修正后的 Markdown。">纠错与格式检查</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="customInstruction">自定义补充要求</label>
                    <textarea id="customInstruction" rows="3" placeholder="例如：改成产品说明书风格，增加 FAQ，保留代码块..."></textarea>
                </div>
                <div class="actions">
                    <button class="btn" id="aiReplaceBtn" onclick="runAiEdit('replace')">替换全文</button>
                    <button class="btn secondary" id="aiAppendBtn" onclick="runAiEdit('append')">追加结果</button>
                </div>
                <p class="small" id="aiStatus" style="margin-top:10px;">模型编辑会使用当前 API URL、API Key 和模型名。</p>

                <div class="divider"></div>

                <div class="form-group">
                    <label for="imgurClientId">🟢 Imgur Client-ID</label>
                    <input id="imgurClientId" class="glass-input" placeholder="填写 Imgur 应用的 Client-ID，用于匿名上传">
                </div>
                <div class="form-group">
                    <label for="mediaFile">🖼️ 选择上传图像/视频</label>
                    <input id="mediaFile" class="glass-input" type="file" accept="image/*,video/*" onchange="handleMediaFile(event)">
                    <div class="media-preview" id="mediaPreview"></div>
                </div>
                <button class="btn green full" id="imgurInsertBtn" onclick="uploadSelectedMediaToImgur()">上传到 Imgur 并插入 MD</button>
                <p class="small" id="imgurStatus" style="margin-top:10px;">选择图片或视频后点击按钮，会自动上传到 Imgur，并把公开链接插入 Markdown，右侧立即预览。</p>

                <div class="divider"></div>
                <div class="actions">
                    <button class="btn secondary" onclick="downloadMarkdown()">下载 .md</button>
                    <button class="btn secondary" onclick="copyMarkdown()">复制全文</button>
                </div>
            </div>
        </aside>

        <main class="main">
            <div class="topbar">
                <button class="tool-btn" title="标题" onclick="wrapLine('# ', '')">H1</button>
                <button class="tool-btn" title="二级标题" onclick="wrapLine('## ', '')">H2</button>
                <button class="tool-btn" title="加粗" onclick="wrapSelection('**', '**')">B</button>
                <button class="tool-btn" title="斜体" onclick="wrapSelection('*', '*')"><em>I</em></button>
                <button class="tool-btn" title="引用" onclick="wrapLine('> ', '')">❝</button>
                <button class="tool-btn" title="无序列表" onclick="wrapLine('- ', '')">•</button>
                <button class="tool-btn" title="有序列表" onclick="wrapLine('1. ', '')">1.</button>
                <button class="tool-btn" title="代码块" onclick="wrapSelection('```\n', '\n```')">{ }</button>
                <button class="tool-btn" title="链接" onclick="wrapSelection('[', '](https://)')">🔗</button>
                <button class="tool-btn" title="表格" onclick="insertAtCursor('\n| 项目 | 说明 |\n| --- | --- |\n| 示例 | 内容 |\n')">表格</button>
                <span class="status" id="docStats">0 字</span>
            </div>

            <section class="split">
                <div class="editor-card">
                    <div class="card-head"><span class="card-title">Markdown 编辑</span><span class="status">自动保存</span></div>
                    <textarea id="markdownInput" spellcheck="false" oninput="handleInput()"></textarea>
                </div>
                <div class="preview-card">
                    <div class="card-head"><span class="card-title">实时预览</span><span class="status">HTML Preview</span></div>
                    <article class="preview" id="previewPane"></article>
                </div>
            </section>
        </main>
    </div>

    <script>
        const DEFAULT_DOC = `# MD 文档编辑器\n\n在左侧输入 Markdown，右侧会实时显示排版效果。\n\n## 支持功能\n\n- 标题、列表、引用、代码块、表格等常用排版\n- 使用默认 API 接口调用模型润色、扩写、精简或纠错\n- 选择图片/视频后自动上传到 Imgur，并把公开链接插入文档\n\n> 图片会插入为 Markdown 图片语法，视频会插入为可预览的 video 标签。\n`;
        const STORAGE_KEYS = {
            doc: 'md_editor_document',
            apiKey: 'md_editor_api_key',
            apiBaseUrl: 'md_editor_api_base_url',
            modelName: 'md_editor_model_name',
            imgurClientId: 'md_editor_imgur_client_id'
        };
        let selectedMedia = null;

        window.addEventListener('load', () => {
            document.getElementById('markdownInput').value = localStorage.getItem(STORAGE_KEYS.doc) || DEFAULT_DOC;
            document.getElementById('apiKey').value = localStorage.getItem(STORAGE_KEYS.apiKey) || localStorage.getItem('frontend_api_key') || '';
            document.getElementById('apiBaseUrl').value = localStorage.getItem(STORAGE_KEYS.apiBaseUrl) || localStorage.getItem('frontend_base_url') || 'https://api.poixe.com/v1/';
            document.getElementById('modelName').value = localStorage.getItem(STORAGE_KEYS.modelName) || 'gemini-3.1-pro-preview';
            document.getElementById('imgurClientId').value = localStorage.getItem(STORAGE_KEYS.imgurClientId) || '';
            ['apiKey', 'apiBaseUrl', 'modelName', 'imgurClientId'].forEach(id => {
                document.getElementById(id).addEventListener('input', saveSettings);
            });
            renderPreview();
        });

        function saveSettings() {
            localStorage.setItem(STORAGE_KEYS.apiKey, document.getElementById('apiKey').value.trim());
            localStorage.setItem(STORAGE_KEYS.apiBaseUrl, document.getElementById('apiBaseUrl').value.trim());
            localStorage.setItem(STORAGE_KEYS.modelName, document.getElementById('modelName').value.trim());
            localStorage.setItem(STORAGE_KEYS.imgurClientId, document.getElementById('imgurClientId').value.trim());
        }

        function handleInput() {
            const text = document.getElementById('markdownInput').value;
            localStorage.setItem(STORAGE_KEYS.doc, text);
            renderPreview();
        }

        function escapeHtml(text) {
            return String(text)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        function inlineMarkdown(text) {
            return escapeHtml(text)
                .replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1">')
                .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>')
                .replace(/`([^`]+)`/g, '<code>$1</code>')
                .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
                .replace(/\*([^*]+)\*/g, '<em>$1</em>');
        }

        function renderMarkdown(markdown) {
            const lines = markdown.split('\n');
            const html = [];
            let inCode = false;
            let codeLines = [];
            let inUl = false;
            let inOl = false;
            let inTable = false;

            const closeLists = () => {
                if (inUl) { html.push('</ul>'); inUl = false; }
                if (inOl) { html.push('</ol>'); inOl = false; }
            };
            const closeTable = () => {
                if (inTable) { html.push('</tbody></table>'); inTable = false; }
            };

            lines.forEach((line) => {
                if (line.trim().startsWith('```')) {
                    if (inCode) {
                        html.push(`<pre><code>${escapeHtml(codeLines.join('\n'))}</code></pre>`);
                        codeLines = [];
                        inCode = false;
                    } else {
                        closeLists(); closeTable(); inCode = true;
                    }
                    return;
                }
                if (inCode) { codeLines.push(line); return; }

                const trimmed = line.trim();
                if (!trimmed) { closeLists(); closeTable(); return; }

                if (/^\|(.+)\|$/.test(trimmed)) {
                    closeLists();
                    const cells = trimmed.slice(1, -1).split('|').map(cell => inlineMarkdown(cell.trim()));
                    if (cells.every(cell => /^:?-{3,}:?$/.test(cell))) return;
                    if (!inTable) { html.push('<table><tbody>'); inTable = true; }
                    const tag = html.join('').includes('<tr>') ? 'td' : 'th';
                    html.push(`<tr>${cells.map(cell => `<${tag}>${cell}</${tag}>`).join('')}</tr>`);
                    return;
                }
                closeTable();

                const rawVideo = trimmed.match(/^<video\s+src=["']([^"']+)["']\s+controls><\/video>$/i);
                if (rawVideo && /^(blob:|https?:|data:video\/)/i.test(rawVideo[1])) {
                    closeLists();
                    html.push(`<video src="${escapeHtml(rawVideo[1])}" controls></video>`);
                    return;
                }

                const heading = trimmed.match(/^(#{1,6})\s+(.+)$/);
                if (heading) {
                    closeLists();
                    const level = heading[1].length;
                    html.push(`<h${level}>${inlineMarkdown(heading[2])}</h${level}>`);
                    return;
                }
                if (/^>\s?/.test(trimmed)) {
                    closeLists();
                    html.push(`<blockquote>${inlineMarkdown(trimmed.replace(/^>\s?/, ''))}</blockquote>`);
                    return;
                }
                if (/^[-*+]\s+/.test(trimmed)) {
                    if (!inUl) { closeLists(); html.push('<ul>'); inUl = true; }
                    html.push(`<li>${inlineMarkdown(trimmed.replace(/^[-*+]\s+/, ''))}</li>`);
                    return;
                }
                if (/^\d+\.\s+/.test(trimmed)) {
                    if (!inOl) { closeLists(); html.push('<ol>'); inOl = true; }
                    html.push(`<li>${inlineMarkdown(trimmed.replace(/^\d+\.\s+/, ''))}</li>`);
                    return;
                }
                closeLists();
                html.push(`<p>${inlineMarkdown(trimmed)}</p>`);
            });

            if (inCode) html.push(`<pre><code>${escapeHtml(codeLines.join('\n'))}</code></pre>`);
            closeLists(); closeTable();
            return html.join('\n');
        }

        function renderPreview() {
            const text = document.getElementById('markdownInput').value;
            document.getElementById('previewPane').innerHTML = renderMarkdown(text);
            document.getElementById('docStats').innerText = `${text.length} 字 · ${text.split(/\s+/).filter(Boolean).length} 词`;
        }

        function getTextarea() { return document.getElementById('markdownInput'); }
        function insertAtCursor(text) {
            const area = getTextarea();
            const start = area.selectionStart;
            const end = area.selectionEnd;
            area.value = area.value.slice(0, start) + text + area.value.slice(end);
            area.focus();
            area.selectionStart = area.selectionEnd = start + text.length;
            handleInput();
        }
        function wrapSelection(prefix, suffix) {
            const area = getTextarea();
            const start = area.selectionStart;
            const end = area.selectionEnd;
            const selected = area.value.slice(start, end) || '文本';
            const next = prefix + selected + suffix;
            area.value = area.value.slice(0, start) + next + area.value.slice(end);
            area.focus();
            area.selectionStart = start + prefix.length;
            area.selectionEnd = start + prefix.length + selected.length;
            handleInput();
        }
        function wrapLine(prefix, suffix) {
            const area = getTextarea();
            const lineStart = area.value.lastIndexOf('\n', area.selectionStart - 1) + 1;
            area.value = area.value.slice(0, lineStart) + prefix + area.value.slice(lineStart) + suffix;
            area.focus();
            area.selectionStart = area.selectionEnd = lineStart + prefix.length;
            handleInput();
        }

        async function runAiEdit(mode) {
            const apiKey = document.getElementById('apiKey').value.trim();
            const baseUrl = document.getElementById('apiBaseUrl').value.trim().replace(/\/+$/, '/') || 'https://api.poixe.com/v1/';
            const model = document.getElementById('modelName').value.trim() || 'gemini-3.1-pro-preview';
            const doc = getTextarea().value.trim();
            const instruction = document.getElementById('aiInstruction').value;
            const customInstruction = document.getElementById('customInstruction').value.trim();
            const status = document.getElementById('aiStatus');
            const buttons = [document.getElementById('aiReplaceBtn'), document.getElementById('aiAppendBtn')];

            if (!apiKey) { alert('请先填写 API Key'); return; }
            if (!doc) { alert('请先输入 Markdown 内容'); return; }

            buttons.forEach(btn => btn.disabled = true);
            status.innerText = '模型正在编辑文档...';
            saveSettings();

            try {
                const response = await fetch(baseUrl + 'chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${apiKey}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model,
                        messages: [
                            { role: 'system', content: '你是专业 Markdown 文档编辑器。只输出 Markdown 正文，不要输出解释。' },
                            { role: 'user', content: `${instruction}\n${customInstruction ? `补充要求：${customInstruction}\n` : ''}\n---\n${doc}` }
                        ],
                        max_tokens: 8192
                    })
                });
                if (!response.ok) {
                    const errData = await response.json().catch(() => ({}));
                    throw new Error(errData?.error?.message || `HTTP ${response.status}`);
                }
                const data = await response.json();
                const result = data.choices?.[0]?.message?.content?.trim();
                if (!result) throw new Error('API 未返回有效 Markdown 内容');
                if (mode === 'replace') getTextarea().value = result;
                else getTextarea().value += `\n\n---\n\n${result}`;
                handleInput();
                status.innerText = `完成：${data.usage?.total_tokens || '未知'} Tokens`;
            } catch (err) {
                status.innerText = `失败：${err.message}`;
                alert(`模型编辑失败：${err.message}`);
            } finally {
                buttons.forEach(btn => btn.disabled = false);
            }
        }

        function handleMediaFile(event) {
            const file = event.target.files[0];
            const preview = document.getElementById('mediaPreview');
            preview.innerHTML = '';
            selectedMedia = null;
            if (!file) return;

            const url = URL.createObjectURL(file);
            selectedMedia = { file, url, type: file.type };
            const el = file.type.startsWith('video/') ? document.createElement('video') : document.createElement('img');
            el.src = url;
            if (el.tagName === 'VIDEO') el.controls = true;
            preview.appendChild(el);
            const info = document.createElement('p');
            info.className = 'small';
            info.innerText = `${file.name} · ${(file.size / 1024 / 1024).toFixed(2)} MB`;
            preview.appendChild(info);
        }

        async function uploadSelectedMediaToImgur() {
            if (!selectedMedia) { alert('请先选择图片或视频'); return; }
            const clientId = document.getElementById('imgurClientId').value.trim();
            if (!clientId) { alert('请先填写 Imgur Client-ID，才能自动上传到 Imgur。'); return; }

            const btn = document.getElementById('imgurInsertBtn');
            const status = document.getElementById('imgurStatus');
            const originalText = btn.innerText;
            btn.disabled = true;
            btn.innerText = '上传中...';
            status.innerText = '正在上传到 Imgur，请稍候...';
            saveSettings();

            try {
                const formData = new FormData();
                formData.append('image', selectedMedia.file);
                formData.append('type', 'file');
                formData.append('name', selectedMedia.file.name);
                formData.append('title', selectedMedia.file.name);

                const response = await fetch('https://api.imgur.com/3/upload', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Client-ID ${clientId}`
                    },
                    body: formData
                });
                const data = await response.json().catch(() => ({}));
                if (!response.ok || !data.success || !data.data?.link) {
                    throw new Error(data?.data?.error || data?.error || `HTTP ${response.status}`);
                }

                const isUploadedVideo = selectedMedia.type.startsWith('video/');
                const link = isUploadedVideo ? (data.data.mp4 || data.data.link) : data.data.link;
                const name = selectedMedia.file.name.replace(/[\]\[()]/g, '-');
                const isVideo = isUploadedVideo || /\.(mp4|webm|mov)$/i.test(link);
                if (isVideo) {
                    insertAtCursor(`\n<video src="${link}" controls></video>\n`);
                } else {
                    insertAtCursor(`\n![${name}](${link})\n`);
                }
                status.innerHTML = `上传成功：<a href="${link}" target="_blank" rel="noopener noreferrer" style="color:#7dd3fc;">${link}</a>`;
            } catch (err) {
                status.innerText = `上传失败：${err.message}`;
                alert(`上传到 Imgur 失败：${err.message}`);
            } finally {
                btn.disabled = false;
                btn.innerText = originalText;
            }
        }

        function downloadMarkdown() {
            const text = getTextarea().value;
            const blob = new Blob([text], { type: 'text/markdown;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `document_${Date.now()}.md`;
            a.click();
            URL.revokeObjectURL(url);
        }

        async function copyMarkdown() {
            await navigator.clipboard.writeText(getTextarea().value);
            alert('已复制 Markdown 全文');
        }
    </script>
</body>
</html>
