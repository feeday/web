<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>模型数据 - AI工具导航</title>
    <link rel="icon" type="image/png" href="/favicon.png">
    <meta name="description" content="我们是一个简洁高效的 AI 导航网站。收录 ChatGPT、Gemini、Llama 等最新 AI 工具、大模型、数据集及开发资源。提供 IP 查询、代码编辑等实用开发者工具，助您快速探索人工智能世界。">
    <meta name="keywords" content="AI导航, 人工智能工具, AI Models, LLM, 免费AI, Midjourney, ChatGPT, 机器学习数据集, 开发者工具">
    <meta name="author" content="datxy">
    <meta name="copyright" content="datxy">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-body: #020617;
            --bg-card: rgba(30, 41, 59, 0.4);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --text-tertiary: #64748b;
            --border-light: rgba(255, 255, 255, 0.08);
            --border-hover: rgba(255, 255, 255, 0.2);
            --radius-card: 16px;
            --radius-pill: 999px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            outline: none;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-primary);
        }

        .sticky-header-wrapper {
            position: sticky;
            top: 0;
            z-index: 999;
            padding: 20px;
            background: rgba(2,6,23,0.95);
            backdrop-filter: blur(10px);
        }

        .sticky-inner {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .search-wrapper {
            display: flex;
            align-items: center;
            background: rgba(15,23,42,0.6);
            border-radius: 999px;
            padding: 6px;
            width: 420px;
        }

        .search-input {
            flex: 1;
            background: transparent;
            border: none;
            color: #fff;
            padding: 8px;
        }

        .search-clear {
            cursor: pointer;
            display: none;
            padding: 0 8px;
        }

        .external-search-btn {
            cursor: pointer;
            padding: 8px;
        }

        .select-options {
            position: absolute;
            background: #0f172a;
            padding: 6px;
            border-radius: 12px;
            display: none;
        }

        .option-item {
            padding: 6px;
            cursor: pointer;
        }

        .option-item.selected {
            color: #38bdf8;
        }

        .resource-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill,minmax(280px,1fr));
            gap: 20px;
            padding: 20px;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-light);
            border-radius: 16px;
            padding: 16px;
        }

        .card-title {
            font-weight: 600;
        }

        .card-desc {
            color: var(--text-secondary);
            font-size: 14px;
        }

        .card-link {
            display: block;
            margin-top: 10px;
            color: #fff;
        }
    </style>
</head>

<body>

<div class="sticky-header-wrapper">
    <div class="sticky-inner">

        <div class="search-wrapper">
            <div class="custom-select">

                <span id="currentEngineText">Google</span>

                <!-- 修复：默认 Google -->
                <input type="hidden" id="searchEngineValue"
                       value="https://www.google.com/search?q=">

                <div class="select-options" id="selectOptions">

                    <div class="option-item selected"
                         onclick="selectEngine('https://www.google.com/search?q=','Google',this)">
                        Google
                    </div>

                    <div class="option-item"
                         onclick="selectEngine('https://www.youtube.com/results?search_query=','YouTube',this)">
                        YouTube
                    </div>

                    <div class="option-item"
                         onclick="selectEngine('https://yandex.by/images/search?text=','Yandex',this)">
                        Yandex
                    </div>

                    <!-- ✔ 修复百度 wd -->
                    <div class="option-item"
                         onclick="selectEngine('https://www.baidu.com/s?wd=','百度',this)">
                        Baidu
                    </div>

                </div>
            </div>

            <input type="text" class="search-input" id="searchInput" placeholder="搜索...">

            <span class="search-clear" id="searchClear" onclick="clearSearch()">✕</span>

            <div class="external-search-btn" id="externalSearchBtn">🔍</div>
        </div>

    </div>
</div>

<div id="grid" class="resource-grid"></div>

<script>
let resources = [];
const grid = document.getElementById('grid');
const searchInput = document.getElementById('searchInput');
const searchClear = document.getElementById('searchClear');

/* =========================
   🌍 IP识别默认搜索引擎
========================= */
async function detectIPEngine() {
    try {
        const res = await fetch('https://ipapi.co/json/');
        const data = await res.json();

        const country = data.country_code;

        if (country === 'CN') {
            selectEngine(
                'https://www.baidu.com/s?wd=',
                '百度',
                document.querySelectorAll('.option-item')[3]
            );
        } else {
            selectEngine(
                'https://www.google.com/search?q=',
                'Google',
                document.querySelectorAll('.option-item')[0]
            );
        }

    } catch (e) {
        console.log('IP检测失败，使用默认Google');
    }
}

/* =========================
   渲染
========================= */
function render(list) {
    grid.innerHTML = '';

    list.forEach(item => {
        const el = document.createElement('div');
        el.className = 'card';

        el.innerHTML = `
            <div class="card-title">${item.title}</div>
            <div class="card-desc">${item.desc}</div>
            <a class="card-link" href="${item.url}" target="_blank">访问</a>
        `;

        grid.appendChild(el);
    });
}

/* =========================
   切换搜索引擎
========================= */
function selectEngine(value, name, el) {
    document.getElementById('searchEngineValue').value = value;
    document.getElementById('currentEngineText').innerText = name;

    document.querySelectorAll('.option-item')
        .forEach(i => i.classList.remove('selected'));

    el.classList.add('selected');
}

/* =========================
   搜索
========================= */
function search() {
    const engine = document.getElementById('searchEngineValue').value;
    const q = searchInput.value.trim();

    if (!q) return;

    window.open(engine + encodeURIComponent(q), '_blank');
}

document.getElementById('externalSearchBtn')
    .addEventListener('click', search);

/* =========================
   输入过滤
========================= */
searchInput.addEventListener('input', e => {
    const v = e.target.value.toLowerCase();
    searchClear.style.display = v ? 'block' : 'none';

    const filtered = resources.filter(i =>
        i.title.toLowerCase().includes(v) ||
        i.desc.toLowerCase().includes(v)
    );

    render(filtered);
});

function clearSearch() {
    searchInput.value = '';
    searchClear.style.display = 'none';
    render(resources);
}

/* =========================
   数据加载
========================= */
fetch('list.json')
    .then(r => r.json())
    .then(data => {
        resources = data;
        render(resources);
    });

/* =========================
   启动 IP检测
========================= */
window.addEventListener('load', () => {
    detectIPEngine();
});
</script>

</body>
</html>
