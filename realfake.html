<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>AI 图片真伪检测系统</title>

<style>

*{
box-sizing:border-box;
}

body{

margin:0;
font-family:
"Microsoft YaHei",
Arial;

background:
linear-gradient(
135deg,
#050816,
#111827,
#1e3a8a
);

min-height:100vh;
color:white;

}


.container{

max-width:1000px;
margin:auto;
padding:20px;

}


.card{

background:
rgba(255,255,255,0.12);

backdrop-filter:
blur(20px);

border-radius:25px;

padding:25px;

box-shadow:
0 20px 60px rgba(0,0,0,.4);

margin-bottom:20px;

}



h1{

text-align:center;

font-size:35px;

background:
linear-gradient(
90deg,
#38bdf8,
#a78bfa
);

-webkit-background-clip:text;
color:transparent;

}



input,select,button{

width:100%;

padding:14px;

border-radius:12px;

border:none;

margin-top:10px;

font-size:16px;

}


input,select{

background:white;

color:#111;

}



button{

background:
linear-gradient(
90deg,
#2563eb,
#9333ea
);

color:white;

cursor:pointer;

font-weight:bold;

}



button:hover{

transform:scale(1.02);

}



.upload{

border:2px dashed #60a5fa;

padding:30px;

text-align:center;

border-radius:20px;

cursor:pointer;

}



.preview{

display:flex;

flex-wrap:wrap;

gap:15px;

margin-top:20px;

}



.preview img{

width:120px;

height:120px;

object-fit:cover;

border-radius:15px;

}



.result{

margin-top:20px;

padding:20px;

border-radius:20px;

background:
rgba(0,0,0,.35);

}



.real{

color:#22c55e;

font-size:28px;

}



.fake{

color:#ef4444;

font-size:28px;

}



.progress{

height:10px;

background:#334155;

border-radius:10px;

overflow:hidden;

}



.bar{

height:100%;

background:
linear-gradient(
90deg,
#22c55e,
#eab308,
#ef4444
);

}



</style>

</head>


<body>


<div class="container">


<div class="card">

<h1>
🤖 AI 图片真伪鉴定系统
</h1>


<label>
API Key
</label>

<input 
id="key"
placeholder="输入 sk-xxxx">


<label>
模型
</label>


<select id="model">


<option value="gpt-4o">
GPT-4o
</option>


<option value="grok-3">
Grok-3
</option>


<option value="gemini-3.1-flash-lite">
Gemini-3.1 Flash Lite
</option>


</select>


</div>



<div class="card">


<div class="upload"
onclick="file.click()">

📷 点击上传图片

<br>

支持 JPG PNG WEBP

</div>


<input 
type="file"
id="file"
multiple
accept="image/*"
hidden>



<div class="preview"
id="preview">

</div>



<button onclick="start()">

开始 AI 鉴定

</button>



</div>



<div id="results"></div>


</div>




<script>


let images=[];


file.onchange=e=>{


images=[...e.target.files];


preview.innerHTML="";


images.forEach(i=>{


let img=document.createElement("img");

img.src=
URL.createObjectURL(i);


preview.appendChild(img);


});


}




const prompt=`

你是一名专业AI生成内容鉴定专家。

分析图片是否：

A 真人摄影
B AI生成/AI修改/换脸

必须选择。

分析：

1 人体结构
手指 四肢 比例 姿态

2 面部
五官 皮肤 眼睛 牙齿

3 光影
阴影 反射 光源

4 物理规律
透视 景深 遮挡

5 背景
文字 错误 纹理

6 AI痕迹
水印 生成特征

输出格式：

最终判断：真实 或 AI伪造

置信度：xx%

依据：

1.
2.
3.

不要输出其他内容。


`;




async function start(){


if(!key.value){

alert("请输入API Key");

return;

}


if(images.length==0){

alert("请选择图片");

return;

}



results.innerHTML="";



for(let img of images){


let div=document.createElement("div");

div.className="card";

div.innerHTML=
`
<h3>
${img.name}
</h3>

正在分析...
`;


results.appendChild(div);



let base64=
await toBase64(img);



try{


let r=await fetch(
"https://api.poixe.com/v1/chat/completions",
{

method:"POST",

headers:{


"Content-Type":
"application/json",


"Authorization":
key.value


},


body:JSON.stringify({

model:model.value,


messages:[

{

role:"user",

content:[


{

type:"text",

text:prompt

},


{

type:"image_url",

image_url:{

url:
base64

}

}


]


}

],


temperature:0.2


})


});



let data=await r.json();



let text=
data.choices[0]
.message
.content;



show(div,text);



}

catch(e){


div.innerHTML=
"错误："+e;


}



}


}





function toBase64(file){


return new Promise(resolve=>{


let reader=new FileReader();


reader.onload=()=>resolve(reader.result);


reader.readAsDataURL(file);


});


}




function show(box,text){


let real=
text.includes("真实");


let fake=
text.includes("AI伪造");



let cls=
real?
"real":
(fake?"fake":"");



let confidence=
text.match(
/\d+%/
);



box.innerHTML=

`

<h3>
检测结果
</h3>


<div class="${cls}">

${real?"✅ 真人实拍":
fake?"⚠️ AI伪造":
"未知"}

</div>


<div class="progress">

<div class="bar"
style="
width:${confidence?confidence[0]:'50%'}
">

</div>

</div>



<pre>
${text}
</pre>

`;

}



</script>


</body>

</html>
